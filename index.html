<style>
  :root{
    --bg:#F1E9D8; --paper:#FBF7EE; --paper-2:#FCF6E8; --line:#DED0AC;
    --bordeaux:#7A2331; --bordeaux-dark:#591620; --ink:#1E2A44;
    --gold:#B8933E; --gold-light:#E4CE93; --charcoal:#2B2620; --charcoal-soft:#6B6153;
    --green:#3C6E47; --red:#A23B2E; --radius:14px;
    --font-display:'Fraunces', Georgia, serif; --font-body:'IBM Plex Sans', -apple-system, sans-serif; --font-mono:'IBM Plex Mono', monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg); background-image:linear-gradient(var(--line) 1px, transparent 1px);
    background-size:100% 2.1em; color:var(--charcoal); font-family:var(--font-body);
    -webkit-font-smoothing:antialiased; min-height:100vh; padding-bottom:calc(78px + env(safe-area-inset-bottom));
    overflow-x:hidden;
  }
  #root{max-width:640px;margin:0 auto;padding:0 16px;}
  h1,h2,h3,h4{font-family:var(--font-display); color:var(--ink); margin:0 0 6px;}
  p{margin:0 0 10px; line-height:1.55;}
  a{color:var(--bordeaux);}
  .eyebrow{font-family:var(--font-mono); text-transform:uppercase; letter-spacing:.09em; font-size:11px; color:var(--bordeaux); font-weight:600;}

  @keyframes viewEnter{ from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }
  .view{animation:viewEnter .38s cubic-bezier(.2,.7,.3,1);}
  @keyframes flicker{ 0%,100%{transform:scale(1);} 50%{transform:scale(1.07);} }
  @keyframes popIn{ from{transform:scale(.85); opacity:0;} to{transform:scale(1); opacity:1;} }
  @keyframes shakeX{ 0%,100%{transform:translateX(0);} 25%{transform:translateX(-6px);} 75%{transform:translateX(6px);} }
  @keyframes bounceIn{ 0%{transform:scale(.5) rotate(-8deg); opacity:0;} 60%{transform:scale(1.12) rotate(3deg);} 100%{transform:scale(1) rotate(0);opacity:1;} }

  .topbar{padding:calc(20px + env(safe-area-inset-top)) 0 14px; display:flex; align-items:center; justify-content:space-between;}
  .brand{display:flex; align-items:center; gap:10px;}
  .brand .seal{
    width:38px;height:38px;border-radius:50%;
    background:radial-gradient(circle at 32% 28%, var(--gold-light), var(--gold) 60%, var(--bordeaux-dark) 100%);
    display:flex;align-items:center;justify-content:center; color:var(--bordeaux-dark);
    font-family:var(--font-display); font-weight:700; font-size:19px;
    box-shadow:0 2px 4px rgba(0,0,0,.25) inset, 0 1px 2px rgba(0,0,0,.2);
  }
  .brand h1{font-size:21px; margin:0;}
  .brand .sub{font-family:var(--font-mono); font-size:10.5px; color:var(--charcoal-soft); letter-spacing:.04em;}
  .streak-badge{display:flex; align-items:center; gap:5px; background:var(--paper); border:1px solid var(--line); padding:6px 10px; border-radius:999px; font-family:var(--font-mono); font-size:12.5px; font-weight:600; color:var(--bordeaux-dark);}
  .streak-badge .flame{display:inline-block; animation:flicker 1.8s ease-in-out infinite;}

  .card{background:var(--paper); border:1px solid var(--line); border-radius:var(--radius); padding:18px; margin-bottom:14px; box-shadow:0 1px 2px rgba(60,40,10,.06), 0 6px 16px -12px rgba(60,40,10,.25);}
  .card.accent{border-left:4px solid var(--bordeaux);}
  .stat-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px;}
  .stat-box{background:var(--paper); border:1px solid var(--line); border-radius:var(--radius); padding:14px; text-align:center;}
  .stat-box .num{font-family:var(--font-display); font-size:30px; color:var(--bordeaux); font-weight:700; line-height:1;}
  .stat-box .lbl{font-size:11px; color:var(--charcoal-soft); margin-top:4px; font-family:var(--font-mono); letter-spacing:.02em;}

  .btn{font-family:var(--font-body); font-weight:600; font-size:14.5px; border-radius:10px; padding:12px 18px; border:none; cursor:pointer; display:inline-flex; align-items:center; gap:8px; justify-content:center; transition:transform .08s ease, box-shadow .15s ease;}
  .btn:active{transform:scale(.96);}
  .btn-primary{background:var(--bordeaux); color:var(--paper); width:100%; box-shadow:0 3px 10px -4px rgba(122,35,49,.6);}
  .btn-secondary{background:transparent; color:var(--bordeaux); border:1.5px solid var(--bordeaux);}
  .btn-ghost{background:transparent; color:var(--charcoal-soft); border:1.5px solid var(--line);}
  .btn-gold{background:var(--gold); color:var(--bordeaux-dark);}
  .btn-block{width:100%;}
  .btn-row{display:flex; gap:8px;}
  .btn-row .btn{flex:1;}

  .art-tag{font-family:var(--font-mono); font-size:11px; font-weight:600; color:var(--bordeaux); background:rgba(122,35,49,.08); border:1px solid rgba(122,35,49,.18); padding:2px 7px; border-radius:5px; display:inline-block; letter-spacing:.02em;}

  .tabbar{position:fixed; bottom:0; left:0; right:0; z-index:20; background:var(--ink); padding:8px 10px calc(8px + env(safe-area-inset-bottom)); display:flex; justify-content:space-around; box-shadow:0 -2px 10px rgba(0,0,0,.25);}
  .tab-btn{background:none; border:none; color:#9AA6C4; display:flex; flex-direction:column; align-items:center; gap:2px; font-family:var(--font-mono); font-size:10px; padding:6px 10px; border-radius:8px; cursor:pointer;}
  .tab-btn .ic{font-size:18px; transition:transform .15s ease;}
  .tab-btn.active{color:var(--gold-light); background:rgba(184,147,62,.12);}
  .tab-btn.active .ic{transform:translateY(-2px) scale(1.08);}

  .section-title{display:flex; align-items:baseline; justify-content:space-between; margin:22px 0 10px; gap:10px;}
  .section-title h2{font-size:18px;}

  .chapter-row{display:flex; align-items:center; justify-content:space-between; gap:10px; padding:13px 0; border-bottom:1px solid var(--line); cursor:pointer;}
  .chapter-row:last-child{border-bottom:none;}
  .chapter-row .ch-main{display:flex; flex-direction:column; gap:4px;}
  .chapter-row .ch-title{font-weight:600; font-size:14.5px; color:var(--ink);}
  .chapter-row .ch-meta{font-size:11.5px; color:var(--charcoal-soft); font-family:var(--font-mono);}
  .chev{color:var(--charcoal-soft); font-size:18px;}

  .flip-wrap{perspective:1400px; margin-bottom:16px;}
  .flip-card{position:relative; width:100%; min-height:230px; transform-style:preserve-3d; transition:transform .55s cubic-bezier(.4,.15,.2,1);}
  .flip-card.flipped{transform:rotateY(180deg);}
  .flip-face{position:absolute; inset:0; backface-visibility:hidden; -webkit-backface-visibility:hidden; border-radius:18px; border:1px solid var(--line); padding:30px 22px; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;}
  .flip-face.front{background:var(--paper);}
  .flip-face.back{background:var(--paper-2); transform:rotateY(180deg); border-color:var(--gold);}
  .flip-face .q{font-family:var(--font-display); font-size:19px; color:var(--ink); line-height:1.4;}
  .flip-face .a{font-family:var(--font-body); font-size:15.5px; color:var(--bordeaux-dark); line-height:1.5;}
  .flip-face .face-tag{position:absolute; top:14px; left:14px;}
  .flip-face .hint{position:absolute; bottom:12px; font-family:var(--font-mono); font-size:10px; color:var(--charcoal-soft); letter-spacing:.03em;}

  .rate-row{display:flex; gap:8px; animation:popIn .3s ease;}
  .rate-btn{flex:1; padding:13px 6px; border-radius:10px; border:none; font-weight:700; font-size:13px; cursor:pointer; color:#fff;}
  .rate-btn:active{transform:scale(.95);}
  .rate-hard{background:var(--red);}
  .rate-mid{background:var(--gold); color:var(--bordeaux-dark);}
  .rate-easy{background:var(--green);}
  .progress-line{font-family:var(--font-mono); font-size:12px; color:var(--charcoal-soft); text-align:center; margin-bottom:10px;}
  .empty-state{text-align:center; padding:36px 12px; color:var(--charcoal-soft);}
  .empty-state .big{font-size:36px; margin-bottom:8px; animation:bounceIn .5s ease;}

  .md h3{font-size:16px; margin-top:16px;}
  .md h4{font-size:14px; margin-top:12px;}
  .md ul{padding-left:20px; margin:0 0 10px;}
  .md li{margin-bottom:5px; line-height:1.5;}
  .md strong{color:var(--bordeaux-dark);}

  .quiz-q{margin-bottom:22px;}
  .quiz-q .qtext{font-weight:600; margin-bottom:10px; color:var(--ink);}
  .quiz-opt{display:block; width:100%; text-align:left; padding:11px 13px; margin-bottom:7px; border-radius:9px; border:1.5px solid var(--line); background:var(--paper); cursor:pointer; font-size:14px; font-family:var(--font-body);}
  .quiz-opt.correct{border-color:var(--green); background:#E4EFE6; color:var(--green); font-weight:600; animation:popIn .35s ease;}
  .quiz-opt.incorrect{border-color:var(--red); background:#F5E6E3; color:var(--red); font-weight:600; animation:shakeX .4s ease;}
  .quiz-opt[disabled]{cursor:default;}
  .explication{font-size:13px; color:var(--charcoal-soft); background:#F1EADA; padding:10px 12px; border-radius:8px; margin-top:2px; margin-bottom:20px; animation:popIn .3s ease;}

  .field{margin-bottom:12px;}
  .field label{display:block; font-family:var(--font-mono); font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:var(--charcoal-soft); margin-bottom:5px;}
  .field input, .field select, .field textarea{width:100%; padding:10px 12px; border-radius:9px; border:1.5px solid var(--line); font-family:var(--font-body); font-size:14.5px; background:#fff;}
  .field textarea{resize:vertical; min-height:60px;}

  .duration-row{display:flex; gap:8px; margin-bottom:16px;}
  .dur-btn{flex:1; padding:14px 6px; border-radius:10px; border:1.5px solid var(--line); background:var(--paper); font-family:var(--font-mono); font-weight:600; cursor:pointer;}
  .dur-btn.active{background:var(--bordeaux); color:#fff; border-color:var(--bordeaux); transform:scale(1.03);}
  .step-track{display:flex; gap:5px; margin-bottom:18px;}
  .step-track .seg{flex:1; height:4px; border-radius:3px; background:var(--line); transition:background .3s ease;}
  .step-track .seg.on{background:var(--bordeaux);}
  .ue-filter{display:flex; gap:6px; margin-bottom:14px; flex-wrap:wrap;}
  .ue-chip{padding:6px 12px; border-radius:999px; border:1.5px solid var(--line); font-family:var(--font-mono); font-size:12px; font-weight:600; cursor:pointer; background:var(--paper); color:var(--charcoal-soft);}
  .ue-chip.active{background:var(--ink); color:#fff; border-color:var(--ink); transform:scale(1.04);}
  .close-x{background:none;border:none;font-size:20px;color:var(--charcoal-soft);cursor:pointer;padding:2px 6px;}

  .divider{height:1px; background:var(--line); margin:18px 0;}
  .timer-card .timer-display{font-family:var(--font-mono); font-size:44px; font-weight:600; color:var(--bordeaux); text-align:center; margin:8px 0 14px; letter-spacing:.02em;}
  .preset-row{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:6px;}
  .preset-btn{flex:1; min-width:56px; padding:10px 4px; border-radius:9px; border:1.5px solid var(--line); background:var(--paper); font-family:var(--font-mono); font-weight:600; font-size:12.5px; cursor:pointer;}
  .mini-timer{position:fixed; right:14px; bottom:calc(86px + env(safe-area-inset-bottom)); background:var(--ink); color:var(--gold-light); font-family:var(--font-mono); font-weight:700; padding:8px 14px; border-radius:999px; box-shadow:0 3px 10px rgba(0,0,0,.3); z-index:19; font-size:14px; cursor:pointer; animation:popIn .3s ease;}
  .link-row{display:flex; align-items:center; justify-content:space-between; gap:10px; padding:11px 0; border-bottom:1px solid var(--line); text-decoration:none; color:var(--charcoal);}
  .link-row:last-child{border-bottom:none;}
  .link-row .ll-title{font-weight:600; font-size:13.5px; color:var(--ink);}
  .link-row .ll-note{font-size:11.5px; color:var(--charcoal-soft);}
  .link-row .arrow{color:var(--bordeaux); font-size:16px;}
  .nblm-box{background:#F4EEDD; border:1px dashed var(--gold); border-radius:12px; padding:14px; margin-top:16px;}
  .nblm-box .steps{font-size:12.5px; color:var(--charcoal-soft); margin:8px 0 12px; line-height:1.6;}
  .subhead{font-family:var(--font-mono); font-size:11.5px; text-transform:uppercase; letter-spacing:.05em; color:var(--charcoal-soft); margin:18px 0 8px;}
  .badge-static{font-family:var(--font-mono); font-size:10.5px; color:var(--green); background:#E4EFE6; border:1px solid #bcd9c2; padding:2px 8px; border-radius:999px; display:inline-block;}

  @media print{
    .tabbar, .topbar, .btn, .close-x, .card.accent.timer-card, .mini-timer{display:none !important;}
    #root{max-width:100%; padding:0;}
    body{background:#fff; padding-bottom:0;}
  }
</style>
</head>

const SEED_FLASHCARDS = [
{ue:'UE1',chapId:'ue1-1',q:"Quelle est la différence entre une règle de droit et une règle morale ?",a:"La règle de droit est assortie d'une contrainte étatique (sanction), alors que la règle morale relève de la conscience individuelle, sans sanction étatique."},
{ue:'UE1',chapId:'ue1-1',q:"Cite les 4 grands blocs de sources du droit français.",a:"Bloc constitutionnel, bloc international / droit de l'UE, bloc de légalité (lois, ordonnances), bloc réglementaire — plus les sources indirectes (jurisprudence, usages, doctrine)."},

{ue:'UE1',chapId:'ue1-1',q:"Qu'est-ce qu'un usage professionnel en tant que source de droit ?",a:"Une pratique répétée et reconnue dans un secteur, qui peut avoir valeur de règle en l'absence de texte contraire."},
{ue:'UE1',chapId:'ue1-1',q:"Qu'est-ce que la doctrine ?",a:"Les analyses et écrits des juristes (universitaires, praticiens) qui commentent et interprètent le droit."},
{ue:'UE1',chapId:'ue1-1',q:"Un traité international prime-t-il sur une loi française ?",a:"Oui, en vertu de l'article 55 de la Constitution, sous réserve de réciprocité."},
{ue:'UE1',chapId:'ue1-1',q:"Qui adopte la loi en France ?",a:"Le Parlement, composé de l'Assemblée nationale et du Sénat."},
{ue:'UE1',chapId:'ue1-1',q:"Une directive européenne s'applique-t-elle directement aux citoyens ?",a:"Non : elle doit être transposée en droit interne, contrairement au règlement européen, d'application directe."},
{ue:'UE1',chapId:'ue1-1',q:"Quelle est l'utilité première de la règle de droit ?",a:"Organiser la vie en société et permettre de résoudre les conflits, avec la garantie d'une sanction étatique."},
{ue:'UE1',chapId:'ue1-1',q:"Un usage local peut-il déroger à une loi impérative ?",a:"Non, un usage ne peut jamais déroger à une loi impérative, qui s'impose sans exception."},
{ue:'UE1',chapId:'ue1-1',q:"Qu'est-ce qu'une ordonnance, au sens de l'article 38 de la Constitution ?",a:"Un acte pris par le gouvernement dans un domaine normalement réservé à la loi, après habilitation du Parlement."},
{ue:'UE1',chapId:'ue1-1',q:"Le Conseil constitutionnel a-t-il un rôle dans la hiérarchie des normes ?",a:"Oui, il contrôle la conformité des lois à la Constitution, avant leur promulgation ou par voie de QPC."},
{ue:'UE1',chapId:'ue1-1',q:"Qu'est-ce qu'un décret d'application ?",a:"Un décret pris par le pouvoir exécutif pour préciser les modalités concrètes de mise en œuvre d'une loi."},
{ue:'UE1',chapId:'ue1-1',q:"La coutume est-elle une source de droit reconnue en France ?",a:"Oui, à titre subsidiaire, notamment en matière commerciale, sous forme d'usages."},
{ue:'UE1',chapId:'ue1-1',q:"Qu'est-ce que le principe de légalité ?",a:"Le principe selon lequel l'administration doit agir dans le respect des lois en vigueur."},
{ue:'UE1',chapId:'ue1-1',q:"Un règlement européen doit-il être transposé par les États membres ?",a:"Non, il est d'application directe et immédiate dans tous les États membres, sans transposition."},
{ue:'UE1',chapId:'ue1-1',q:"Quelle est la place de la Constitution dans la hiérarchie des normes ?",a:"Elle occupe le sommet de la hiérarchie des normes en droit interne français."},
{ue:'UE1',chapId:'ue1-2',q:"Quelles sont les 3 conditions de validité d'un contrat en droit commun ?",a:"Le consentement, la capacité, et un contenu licite et certain."},
{ue:'UE1',chapId:'ue1-2',q:"Cite les 3 vices du consentement.",a:"L'erreur, le dol et la violence."},
{ue:'UE1',chapId:'ue1-2',q:"Que signifie un contenu 'licite et certain' pour un contrat ?",a:"L'objet du contrat doit exister, être déterminé ou déterminable, et conforme à l'ordre public."},
{ue:'UE1',chapId:'ue1-2',q:"Différence entre contrat synallagmatique et contrat unilatéral ?",a:"Synallagmatique : obligations réciproques entre les parties. Unilatéral : une seule partie s'engage envers l'autre."},
{ue:'UE1',chapId:'ue1-2',q:"Différence entre responsabilité contractuelle et extracontractuelle ?",a:"Contractuelle : inexécution d'un contrat existant. Extracontractuelle : dommage causé en dehors de tout contrat."},
{ue:'UE1',chapId:'ue1-2',q:"Quels sont les 3 éléments constitutifs de la responsabilité civile ?",a:"Un fait générateur, un préjudice réparable, et un lien de causalité entre les deux."},
{ue:'UE1',chapId:'ue1-2',q:"Qu'est-ce qu'une cause d'exonération de responsabilité ?",a:"Un évènement qui rompt le lien de causalité : force majeure, fait d'un tiers, ou faute de la victime."},
{ue:'UE1',chapId:'ue1-2',q:"Quelles sont les 3 caractéristiques de la force majeure ?",a:"Un évènement imprévisible, irrésistible et extérieur, qui empêche l'exécution de l'obligation."},
{ue:'UE1',chapId:'ue1-2',q:"Quel est le principe de la responsabilité du fait des choses ?",a:"Le gardien d'une chose répond des dommages qu'elle cause, même sans faute de sa part."},
{ue:'UE1',chapId:'ue1-2',q:"Comment fonctionne la responsabilité du commettant du fait de son préposé ?",a:"L'employeur répond des dommages causés par son salarié dans l'exercice de ses fonctions."},
{ue:'UE1',chapId:'ue1-2',q:"Qu'est-ce qu'un préjudice réparable ?",a:"Un dommage certain, direct et légitime."},
{ue:'UE1',chapId:'ue1-2',q:"Quel régime de responsabilité s'applique au trouble anormal de voisinage ?",a:"Une responsabilité sans faute, dès lors que le trouble dépasse les inconvénients normaux du voisinage."},
{ue:'UE1',chapId:'ue1-2',q:"Qu'est-ce qu'un contrat consensuel ?",a:"Un contrat qui se forme par le seul échange des consentements, sans formalité particulière."},
{ue:'UE1',chapId:'ue1-2',q:"Qu'est-ce que la nullité d'un contrat ?",a:"La sanction qui anéantit rétroactivement un contrat conclu en violation de ses conditions de validité."},
{ue:'UE1',chapId:'ue1-2',q:"Différence entre nullité relative et nullité absolue ?",a:"La relative protège un intérêt privé (invocable par la victime) ; l'absolue protège l'intérêt général (invocable par tous)."},
{ue:'UE1',chapId:'ue1-2',q:"Qu'est-ce que la responsabilité du fait des produits défectueux ?",a:"Un régime permettant à la victime d'un produit défectueux d'être indemnisée par le producteur sans prouver sa faute."},
{ue:'UE1',chapId:'ue1-2',q:"Qu'est-ce qu'un dommage moral ?",a:"Un préjudice non-patrimonial, comme une souffrance psychologique ou une atteinte à la réputation."},
{ue:'UE1',chapId:'ue1-2',q:"La faute de la victime peut-elle exonérer totalement l'auteur du dommage ?",a:"Oui, si elle est la cause exclusive du dommage ; sinon elle réduit seulement partiellement la responsabilité."},
{ue:'UE1',chapId:'ue1-2',q:"Qu'est-ce qu'une clause limitative de responsabilité ?",a:"Une clause contractuelle qui plafonne le montant de l'indemnisation due en cas d'inexécution."},
{ue:'UE1',chapId:'ue1-2',q:"Quel est le délai de prescription de droit commun en matière civile ?",a:"5 ans à compter du jour où le titulaire du droit a connu ou aurait dû connaître les faits."},
{ue:'UE1',chapId:'ue1-3',q:"Qui supporte la charge de la preuve, par principe ?",a:"Celui qui réclame l'exécution d'une obligation doit la prouver."},
{ue:'UE1',chapId:'ue1-3',q:"Cite les principaux modes de preuve.",a:"L'écrit (acte authentique, acte sous signature privée), le témoignage, la présomption, et l'aveu."},
{ue:'UE1',chapId:'ue1-3',q:"Différence entre acte authentique et acte sous signature privée ?",a:"L'authentique est reçu par un officier public (notaire) ; le sous signature privée est signé par les parties seules."},
{ue:'UE1',chapId:'ue1-3',q:"Qu'est-ce qu'une présomption, en matière de preuve ?",a:"Un mode de preuve qui consiste à déduire un fait inconnu à partir d'un fait connu."},
{ue:'UE1',chapId:'ue1-3',q:"Comment le patrimoine personnel de l'entrepreneur individuel est-il protégé aujourd'hui ?",a:"Depuis la réforme de 2022, la séparation entre patrimoine professionnel et personnel est automatique."},
{ue:'UE1',chapId:'ue1-3',q:"Différence entre responsabilité civile et responsabilité pénale ?",a:"La civile répare un dommage (indemnisation) ; la pénale sanctionne une infraction au nom de la société."},
{ue:'UE1',chapId:'ue1-3',q:"Peut-on cumuler responsabilité civile et responsabilité pénale pour un même fait ?",a:"Oui, sous certaines conditions, les deux régimes peuvent se cumuler."},
{ue:'UE1',chapId:'ue1-3',q:"Qu'est-ce que la force probante d'un mode de preuve ?",a:"Sa capacité à convaincre le juge, qui varie selon le type de preuve utilisé."},
{ue:'UE1',chapId:'ue1-3',q:"Un écrit électronique a-t-il la même valeur qu'un écrit papier ?",a:"Oui, sous conditions : identification fiable de l'auteur et intégrité du document."},
{ue:'UE1',chapId:'ue1-3',q:"Qu'est-ce que l'aveu judiciaire ?",a:"La reconnaissance par une partie, devant le juge, d'un fait qui lui est défavorable."},
{ue:'UE1',chapId:'ue1-3',q:"Le témoignage a-t-il une force probante absolue ?",a:"Non : le juge l'apprécie librement, dans un système de preuve dite morale."},
{ue:'UE1',chapId:'ue1-3',q:"Pourquoi est-il important de bien identifier le mode de preuve applicable à une situation ?",a:"Parce que cela conditionne la stratégie et les chances de succès dans un litige."},
{ue:'UE1',chapId:'ue1-3',q:"Qu'est-ce qu'une clause de réserve de propriété ?",a:"Une clause qui retarde le transfert de propriété d'un bien vendu jusqu'au paiement complet du prix."},
{ue:'UE1',chapId:'ue1-3',q:"Le SMS ou l'email peuvent-ils constituer un mode de preuve ?",a:"Oui, ce sont des écrits électroniques recevables, appréciés librement par le juge."},
{ue:'UE1',chapId:'ue1-3',q:"Qu'est-ce que l'EIRL et existe-t-il encore ?",a:"L'Entrepreneur Individuel à Responsabilité Limitée a été supprimé en 2022, remplacé par le statut unique à patrimoine scindé."},
{ue:'UE1',chapId:'ue1-3',q:"Un entrepreneur individuel peut-il renoncer à la protection de son patrimoine personnel ?",a:"Oui, il peut y renoncer pour un engagement spécifique, notamment envers un créancier professionnel."},
{ue:'UE1',chapId:'ue1-3',q:"Qu'est-ce que la prescription extinctive ?",a:"L'extinction d'un droit d'agir en justice par l'écoulement d'un certain délai."},
{ue:'UE1',chapId:'ue1-3',q:"Qui peut être témoin dans un litige civil ?",a:"Toute personne ayant eu connaissance directe des faits, sous réserve de certaines incapacités à témoigner."},
{ue:'UE1',chapId:'ue1-3',q:"Qu'est-ce qu'un commencement de preuve par écrit ?",a:"Un écrit qui rend vraisemblable le fait allégué, complétable par d'autres modes de preuve comme le témoignage."},
{ue:'UE1',chapId:'ue1-3',q:"La responsabilité pénale d'un entrepreneur individuel affecte-t-elle son patrimoine personnel séparé ?",a:"Oui, les amendes pénales peuvent être recouvrées sur l'ensemble de son patrimoine."},
{ue:'UE5',chapId:'ue5-1',q:"Quel est l'objet de la science économique selon l'école néoclassique ?",a:"La gestion de la rareté des ressources face à des besoins illimités."},
{ue:'UE5',chapId:'ue5-1',q:"Qu'est-ce que la valeur ajoutée ?",a:"La richesse créée par une unité de production : production moins consommations intermédiaires."},
{ue:'UE5',chapId:'ue5-1',q:"Quels sont les grands secteurs institutionnels de la comptabilité nationale (5+1) ?",a:"Ménages, sociétés non financières, sociétés financières, administrations publiques, ISBLSM, reste du monde."},
{ue:'UE5',chapId:'ue5-1',q:"Qu'est-ce que la tertiarisation de l'économie ?",a:"Le poids croissant du secteur des services dans l'activité économique."},
{ue:'UE5',chapId:'ue5-1',q:"Quel évènement marque la naissance des politiques keynésiennes ?",a:"La crise de 1929 et la Grande Dépression qui a suivi."},
{ue:'UE5',chapId:'ue5-1',q:"Que désignent les 'Trente Glorieuses' ?",a:"La période de forte croissance économique en France entre 1945 et 1975."},
{ue:'UE5',chapId:'ue5-1',q:"Quelle est l'idée centrale du courant libéral classique ?",a:"La confiance dans les mécanismes de marché et un rôle limité de l'État."},
{ue:'UE5',chapId:'ue5-1',q:"Quelle est l'idée centrale du courant keynésien ?",a:"L'intervention de l'État est nécessaire pour soutenir la demande, notamment en période de crise."},
{ue:'UE5',chapId:'ue5-1',q:"Que critique Marx dans l'analyse économique classique ?",a:"L'exploitation du travail par le capital et les contradictions internes du capitalisme."},
{ue:'UE5',chapId:'ue5-1',q:"Qu'est-ce que la répartition primaire des revenus ?",a:"La répartition des revenus liée directement à la production (salaires, profits), avant impôts et prestations."},
{ue:'UE5',chapId:'ue5-1',q:"Qu'est-ce qu'un agent économique ?",a:"Une unité de décision autonome qui participe à l'activité économique (ménage, entreprise, État...)."},
{ue:'UE5',chapId:'ue5-1',q:"Qu'est-ce que la comptabilité nationale ?",a:"Le cadre statistique qui mesure et représente l'activité économique d'un pays."},
{ue:'UE5',chapId:'ue5-1',q:"Qu'est-ce que le circuit économique ?",a:"La représentation simplifiée des flux entre les différents agents économiques."},
{ue:'UE5',chapId:'ue5-1',q:"Qu'est-ce que la monnaie scripturale ?",a:"La monnaie qui circule par écriture sur les comptes bancaires, par opposition à la monnaie fiduciaire."},
{ue:'UE5',chapId:'ue5-1',q:"Selon Schumpeter, quel est le moteur de la croissance capitaliste ?",a:"L'innovation portée par l'entrepreneur, via un processus de destruction créatrice."},
{ue:'UE5',chapId:'ue5-1',q:"Qu'est-ce qu'un choc pétrolier et quel est son impact économique classique ?",a:"Une hausse brutale du prix du pétrole, pouvant provoquer inflation et ralentissement économique."},
{ue:'UE5',chapId:'ue5-1',q:"Qu'est-ce que la stagflation ?",a:"Une situation combinant stagnation de la croissance et inflation élevée."},
{ue:'UE5',chapId:'ue5-1',q:"Qu'est-ce que le PIB potentiel ?",a:"Le niveau de production qu'une économie peut atteindre durablement sans tensions inflationnistes."},
{ue:'UE5',chapId:'ue5-1',q:"Qu'est-ce qu'un cycle économique ?",a:"Une succession de phases d'expansion et de récession autour de la tendance de long terme."},
{ue:'UE5',chapId:'ue5-1',q:"Différence entre micro-économie et macro-économie ?",a:"La micro étudie les agents individuels ; la macro étudie les agrégats économiques globaux."},
{ue:'UE5',chapId:'ue5-2',q:"Quelles sont les 5 conditions de la concurrence pure et parfaite ?",a:"Atomicité, homogénéité des produits, libre entrée/sortie, transparence de l'information, mobilité des facteurs."},
{ue:'UE5',chapId:'ue5-2',q:"Qu'est-ce que l'optimum de Pareto ?",a:"Une situation où on ne peut améliorer le bien-être d'un agent sans détériorer celui d'un autre."},
{ue:'UE5',chapId:'ue5-2',q:"Différence entre price taker et price maker ?",a:"Le price taker subit le prix ; le price maker peut l'influencer (pouvoir de marché)."},
{ue:'UE5',chapId:'ue5-2',q:"Qu'est-ce qu'un monopole ?",a:"Un marché avec un seul offreur face à une multitude de demandeurs."},
{ue:'UE5',chapId:'ue5-2',q:"Qu'est-ce qu'un oligopole ?",a:"Un marché avec un petit nombre d'offreurs."},
{ue:'UE5',chapId:'ue5-2',q:"Qu'est-ce que la concurrence monopolistique ?",a:"Un marché avec de nombreux offreurs proposant des produits différenciés."},
{ue:'UE5',chapId:'ue5-2',q:"Qu'est-ce qu'une externalité ?",a:"Un effet, positif ou négatif, de l'activité d'un agent sur un tiers, sans compensation monétaire."},
{ue:'UE5',chapId:'ue5-2',q:"Donne un exemple d'externalité négative.",a:"La pollution générée par une usine, subie par les riverains sans compensation."},
{ue:'UE5',chapId:'ue5-2',q:"Qu'est-ce qu'un bien collectif (bien public) ?",a:"Un bien non rival et non exclusif, comme l'éclairage public."},
{ue:'UE5',chapId:'ue5-2',q:"Qu'est-ce qu'une asymétrie d'information ?",a:"Une situation où une partie dispose de plus d'informations que l'autre, faussant le marché."},
{ue:'UE5',chapId:'ue5-2',q:"Qu'est-ce qu'une barrière à l'entrée ?",a:"Un obstacle qui empêche ou dissuade de nouvelles entreprises d'entrer sur un marché."},
{ue:'UE5',chapId:'ue5-2',q:"Qu'est-ce qu'un cartel ?",a:"Une entente entre entreprises concurrentes visant à fausser la concurrence."},
{ue:'UE5',chapId:'ue5-2',q:"Qu'est-ce que la théorie des jeux appliquée à l'oligopole ?",a:"Un cadre d'analyse des décisions stratégiques interdépendantes entre un petit nombre d'entreprises."},
{ue:'UE5',chapId:'ue5-2',q:"Qu'est-ce qu'un monopole naturel ?",a:"Un marché où un seul offreur est plus efficace que plusieurs, en raison de coûts fixes très élevés."},
{ue:'UE5',chapId:'ue5-2',q:"Comment l'État peut-il réguler un monopole ?",a:"Par une régulation des prix, une nationalisation, ou l'ouverture contrôlée à la concurrence."},
{ue:'UE5',chapId:'ue5-2',q:"Qu'est-ce qu'un passager clandestin (free rider) ?",a:"Un agent qui bénéficie d'un bien collectif sans en supporter le coût."},
{ue:'UE5',chapId:'ue5-2',q:"Comment l'État peut-il financer un bien collectif ?",a:"Par l'impôt, le marché ne permettant pas de le financer efficacement seul."},
{ue:'UE5',chapId:'ue5-2',q:"Qu'est-ce que l'aléa moral ?",a:"Une situation où une partie, une fois assurée ou protégée, prend plus de risques."},
{ue:'UE5',chapId:'ue5-2',q:"Qu'est-ce que la sélection adverse ?",a:"Une situation où l'asymétrie d'information conduit à une sur-représentation des mauvais risques sur un marché."},
{ue:'UE5',chapId:'ue5-2',q:"Quel économiste est associé à la théorie des coûts de transaction et à l'existence de la firme ?",a:"Ronald Coase."},
{ue:'UE5',chapId:'ue5-3',q:"Différence entre financement direct et financement indirect ?",a:"Direct : emprunt direct sur les marchés. Indirect : passage par un intermédiaire financier, la banque."},
{ue:'UE5',chapId:'ue5-3',q:"Qu'est-ce que l'intermédiation financière ?",a:"Le rôle des banques qui collectent l'épargne et accordent des crédits, en transformant les échéances."},
{ue:'UE5',chapId:'ue5-3',q:"En quoi consiste la création monétaire par les banques ?",a:"Les crédits accordés par les banques créent de la monnaie : 'les crédits font les dépôts'."},
{ue:'UE5',chapId:'ue5-3',q:"Différence entre financement interne et externe pour une entreprise ?",a:"Interne : autofinancement. Externe : recours à l'emprunt ou aux marchés financiers."},
{ue:'UE5',chapId:'ue5-3',q:"Quels sont les grands types de marchés de capitaux ?",a:"Le marché financier, le marché monétaire, le marché des changes, le marché des produits dérivés."},
{ue:'UE5',chapId:'ue5-3',q:"Quels facteurs déterminent le comportement d'épargne des ménages ?",a:"Le revenu, l'âge, l'inflation, le taux d'intérêt, la fiscalité et l'incertitude."},
{ue:'UE5',chapId:'ue5-3',q:"Quels sont les déterminants de l'investissement des entreprises ?",a:"La demande anticipée, les profits attendus, le taux d'intérêt, la situation financière de l'entreprise."},
{ue:'UE5',chapId:'ue5-3',q:"Qu'est-ce qu'un agent à capacité de financement ?",a:"Un agent dont l'épargne est supérieure à son investissement."},
{ue:'UE5',chapId:'ue5-3',q:"Qu'est-ce qu'un agent à besoin de financement ?",a:"Un agent dont l'investissement dépasse son épargne."},
{ue:'UE5',chapId:'ue5-3',q:"Quelles sont les 3 fonctions économiques de la monnaie ?",a:"Unité de compte, intermédiaire des échanges, réserve de valeur."},
{ue:'UE5',chapId:'ue5-3',q:"Qu'est-ce que le taux d'intérêt directeur ?",a:"Le taux fixé par la banque centrale, qui influence l'ensemble des taux d'intérêt de l'économie."},
{ue:'UE5',chapId:'ue5-3',q:"Comment une hausse des taux directeurs affecte-t-elle l'investissement ?",a:"Elle renchérit le coût du crédit et tend à freiner l'investissement."},
{ue:'UE5',chapId:'ue5-3',q:"Qu'est-ce qu'un marché primaire et un marché secondaire ?",a:"Primaire : émission de nouveaux titres. Secondaire : échange de titres déjà émis."},
{ue:'UE5',chapId:'ue5-3',q:"Qu'est-ce que la liquidité d'un actif ?",a:"La capacité à transformer rapidement un actif en monnaie sans perte de valeur importante."},
{ue:'UE5',chapId:'ue5-3',q:"Qu'est-ce que le risque de crédit ?",a:"Le risque qu'un emprunteur ne rembourse pas tout ou partie de sa dette."},
{ue:'UE5',chapId:'ue5-3',q:"Qu'est-ce que la désintermédiation financière ?",a:"La tendance des agents à se financer directement sur les marchés plutôt que par le crédit bancaire."},
{ue:'UE5',chapId:'ue5-3',q:"Qu'est-ce que le crowdfunding ?",a:"Un mode de financement direct où de nombreux particuliers financent un projet via une plateforme."},
{ue:'UE5',chapId:'ue5-3',q:"Qu'est-ce que la titrisation ?",a:"La transformation de créances en titres financiers négociables sur les marchés."},
{ue:'UE5',chapId:'ue5-3',q:"Qu'est-ce que le taux d'usure ?",a:"Le taux d'intérêt maximal légal qu'un prêteur ne peut pas dépasser."},
{ue:'UE5',chapId:'ue5-3',q:"Pourquoi les banques centrales surveillent-elles la masse monétaire ?",a:"Parce qu'une création monétaire excessive peut alimenter l'inflation."},
{ue:'UE5',chapId:'ue5-4',q:"Qu'est-ce que le PIB ?",a:"La valeur de l'ensemble des richesses produites sur un territoire pendant une période donnée."},
{ue:'UE5',chapId:'ue5-4',q:"Quelles sont les 3 approches de calcul du PIB ?",a:"Par la production, par les revenus, et par les dépenses."},
{ue:'UE5',chapId:'ue5-4',q:"Différence entre PIB en valeur et PIB en volume ?",a:"Valeur : prix courants (inclut l'inflation). Volume : prix constants (mesure la croissance réelle)."},
{ue:'UE5',chapId:'ue5-4',q:"Quelle est la principale limite du PIB comme indicateur de richesse ?",a:"Il ne mesure ni le bien-être, ni les inégalités, ni les impacts environnementaux."},
{ue:'UE5',chapId:'ue5-4',q:"Qu'est-ce que l'IDH ?",a:"Un indicateur combinant PIB par habitant, espérance de vie et niveau d'éducation."},
{ue:'UE5',chapId:'ue5-4',q:"Quels sont les 3 facteurs de production classiques ?",a:"Le capital, le travail et les ressources naturelles."},
{ue:'UE5',chapId:'ue5-4',q:"Quel est le rôle du progrès technique selon Solow ?",a:"Il explique la part de la croissance non expliquée par le capital et le travail (résidu)."},
{ue:'UE5',chapId:'ue5-4',q:"Qu'est-ce que la croissance endogène ?",a:"Une théorie où la croissance s'auto-entretient grâce à l'innovation, au capital humain, à la recherche."},
{ue:'UE5',chapId:'ue5-4',q:"Comment définir le développement durable ?",a:"Un développement qui répond aux besoins du présent sans compromettre ceux des générations futures."},
{ue:'UE5',chapId:'ue5-4',q:"Qu'est-ce que l'économie circulaire ?",a:"Un modèle limitant le gaspillage des ressources par le réemploi, la réparation et le recyclage."},
{ue:'UE5',chapId:'ue5-4',q:"Qu'est-ce que le PIB par habitant ?",a:"Le PIB total divisé par la population, utilisé pour comparer le niveau de vie moyen entre pays."},
{ue:'UE5',chapId:'ue5-4',q:"Qu'est-ce que la productivité du travail ?",a:"Le rapport entre la production réalisée et la quantité de travail utilisée."},
{ue:'UE5',chapId:'ue5-4',q:"Qu'est-ce que l'accumulation du capital ?",a:"L'augmentation du stock de capital productif dans une économie."},
{ue:'UE5',chapId:'ue5-4',q:"Qu'est-ce que le capital humain ?",a:"L'ensemble des connaissances et compétences qui rendent le travail plus productif."},
{ue:'UE5',chapId:'ue5-4',q:"Qu'est-ce qu'une externalité positive de la R&D ?",a:"Les innovations d'une entreprise profitent à d'autres agents sans compensation, stimulant la croissance."},
{ue:'UE5',chapId:'ue5-4',q:"Qu'est-ce que la convergence économique entre pays ?",a:"La tendance des pays moins développés à rattraper le niveau de vie des pays avancés."},
{ue:'UE5',chapId:'ue5-4',q:"Qu'est-ce que la soutenabilité de la croissance ?",a:"La capacité d'une croissance à se poursuivre sans épuiser les ressources ni dégrader l'environnement."},
{ue:'UE5',chapId:'ue5-4',q:"Qu'est-ce que l'empreinte écologique ?",a:"Un indicateur qui mesure la pression exercée par l'activité humaine sur les ressources naturelles."},
{ue:'UE5',chapId:'ue5-4',q:"Qu'est-ce que la décroissance, en tant que courant de pensée ?",a:"Un courant qui prône une réduction volontaire de la production pour préserver l'environnement."},
{ue:'UE5',chapId:'ue5-4',q:"Différence entre croissance extensive et intensive ?",a:"Extensive : plus de facteurs utilisés. Intensive : gains de productivité."},
{ue:'UE5',chapId:'ue5-5',q:"Quelles sont les 3 fonctions de l'État selon Musgrave ?",a:"L'allocation des ressources, la redistribution des revenus, la stabilisation de l'activité économique."},
{ue:'UE5',chapId:'ue5-5',q:"Qu'est-ce que le budget de l'État ?",a:"Le document qui présente les prévisions de dépenses et de recettes publiques pour une année."},
{ue:'UE5',chapId:'ue5-5',q:"Différence entre déficit public et dette publique ?",a:"Le déficit est le solde négatif d'une année ; la dette est le cumul des déficits passés."},
{ue:'UE5',chapId:'ue5-5',q:"Comment définit-on l'inflation ?",a:"Une hausse générale et durable du niveau des prix."},
{ue:'UE5',chapId:'ue5-5',q:"Différence entre politique conjoncturelle et structurelle ?",a:"Conjoncturelle : court terme. Structurelle : long terme sur les structures de l'économie."},
{ue:'UE5',chapId:'ue5-5',q:"Différence entre politique de demande et politique d'offre ?",a:"Demande : relance par la dépense publique. Offre : soutien à la compétitivité des entreprises."},
{ue:'UE5',chapId:'ue5-5',q:"Quel est l'objectif principal de la BCE ?",a:"Assurer la stabilité des prix (maîtrise de l'inflation) dans la zone euro."},
{ue:'UE5',chapId:'ue5-5',q:"Qu'est-ce que le Pacte de Stabilité et de Croissance ?",a:"Un cadre européen qui encadre les déficits publics et la dette des États membres."},
{ue:'UE5',chapId:'ue5-5',q:"Qu'est-ce que l'assouplissement quantitatif ?",a:"Une politique monétaire non conventionnelle de rachat massif de titres pour injecter des liquidités."},
{ue:'UE5',chapId:'ue5-5',q:"Qu'est-ce que le semestre européen ?",a:"Un cycle annuel de coordination des politiques économiques et budgétaires des États membres de l'UE."},
{ue:'UE5',chapId:'ue5-5',q:"Qu'est-ce qu'un stabilisateur automatique ?",a:"Un mécanisme budgétaire qui atténue automatiquement les fluctuations économiques."},
{ue:'UE5',chapId:'ue5-5',q:"Qu'est-ce que le multiplicateur keynésien ?",a:"Le mécanisme par lequel une hausse des dépenses publiques génère une hausse plus que proportionnelle du PIB."},
{ue:'UE5',chapId:'ue5-5',q:"Qu'est-ce que l'effet d'éviction ?",a:"L'endettement public fait monter les taux d'intérêt et décourage l'investissement privé."},
{ue:'UE5',chapId:'ue5-5',q:"Qu'est-ce que la politique monétaire expansionniste ?",a:"Une politique qui stimule l'activité en baissant les taux d'intérêt ou augmentant la masse monétaire."},
{ue:'UE5',chapId:'ue5-5',q:"Qu'est-ce que l'indépendance de la banque centrale ?",a:"Le principe selon lequel elle décide sa politique sans pression du pouvoir politique."},
{ue:'UE5',chapId:'ue5-5',q:"Qu'est-ce que la courbe de Phillips ?",a:"Une relation qui met en évidence un arbitrage à court terme entre inflation et chômage."},
{ue:'UE5',chapId:'ue5-5',q:"Qu'est-ce qu'une politique budgétaire restrictive ?",a:"Une politique qui réduit les dépenses ou augmente les impôts pour freiner l'activité ou le déficit."},
{ue:'UE5',chapId:'ue5-5',q:"Qu'est-ce que le ratio dette/PIB ?",a:"Un indicateur qui rapporte la dette publique à la richesse produite."},
{ue:'UE5',chapId:'ue5-5',q:"Qu'est-ce que la politique de change ?",a:"Les interventions publiques visant à influencer la valeur d'une monnaie sur le marché des changes."},
{ue:'UE5',chapId:'ue5-5',q:"Quel est le rôle du FMI ?",a:"Aider les pays en difficulté financière et surveiller la stabilité du système monétaire international."},
{ue:'UE5',chapId:'ue5-6',q:"Différence entre chômage conjoncturel et structurel ?",a:"Conjoncturel : lié aux fluctuations (temporaire). Structurel : déséquilibres durables du marché du travail."},
{ue:'UE5',chapId:'ue5-6',q:"Qu'est-ce que le taux de chômage au sens du BIT ?",a:"La part des personnes sans emploi, disponibles et en recherche active, dans la population active."},
{ue:'UE5',chapId:'ue5-6',q:"Qu'est-ce que le halo du chômage ?",a:"Les personnes sans emploi souhaitant travailler mais non comptabilisées comme chômeurs."},
{ue:'UE5',chapId:'ue5-6',q:"Différence entre flexibilité quantitative et qualitative ?",a:"Quantitative : ajuster le volume d'emploi. Qualitative : ajuster l'organisation du travail."},
{ue:'UE5',chapId:'ue5-6',q:"Qu'est-ce qu'une politique active de l'emploi ?",a:"Une mesure favorisant directement le retour à l'emploi (formation, aide à l'embauche)."},
{ue:'UE5',chapId:'ue5-6',q:"Qu'est-ce qu'une politique passive de l'emploi ?",a:"Une mesure qui compense les effets du chômage (indemnisation)."},
{ue:'UE5',chapId:'ue5-6',q:"Avec quels outils mesure-t-on les inégalités de revenus ?",a:"La courbe de Lorenz et l'indice de Gini."},
{ue:'UE5',chapId:'ue5-6',q:"Que signifie un indice de Gini proche de 0 ?",a:"Une répartition des revenus très égalitaire."},
{ue:'UE5',chapId:'ue5-6',q:"Qu'est-ce que la redistribution ?",a:"Le mécanisme par lequel l'État prélève des impôts et verse des prestations pour réduire les inégalités."},
{ue:'UE5',chapId:'ue5-6',q:"Qu'apportent les travaux de Piketty sur les inégalités ?",a:"Une analyse historique montrant la tendance à la concentration du capital et des inégalités de patrimoine."},
{ue:'UE5',chapId:'ue5-6',q:"Qu'est-ce que le salaire minimum (SMIC) ?",a:"Le salaire horaire minimum légal en France."},
{ue:'UE5',chapId:'ue5-6',q:"Qu'est-ce que la précarité de l'emploi ?",a:"Une instabilité professionnelle liée à des contrats courts, un temps partiel subi ou un risque de perte d'emploi."},
{ue:'UE5',chapId:'ue5-6',q:"Qu'est-ce que le taux d'activité ?",a:"La part des personnes en emploi ou au chômage dans la population en âge de travailler."},
{ue:'UE5',chapId:'ue5-6',q:"Qu'est-ce que la discrimination sur le marché du travail ?",a:"Un traitement défavorable fondé sur un critère non lié aux compétences."},
{ue:'UE5',chapId:'ue5-6',q:"Qu'est-ce que la mobilité sociale ?",a:"Le changement de position sociale d'un individu par rapport à ses parents ou au cours de sa vie."},
{ue:'UE5',chapId:'ue5-6',q:"Qu'est-ce que la pauvreté monétaire relative ?",a:"Un revenu inférieur à un seuil fixé en proportion du revenu médian (60% en France/UE)."},
{ue:'UE5',chapId:'ue5-6',q:"Qu'est-ce que la protection sociale ?",a:"L'ensemble des mécanismes qui protègent contre les risques sociaux (maladie, chômage, vieillesse)."},
{ue:'UE5',chapId:'ue5-6',q:"Différence entre logique d'assurance et d'assistance ?",a:"Assurance : cotisations proportionnelles. Assistance : financée par l'impôt, sous conditions de ressources."},
{ue:'UE5',chapId:'ue5-6',q:"Qu'est-ce que le RSA ?",a:"Le Revenu de Solidarité Active, prestation garantissant un revenu minimum."},
{ue:'UE5',chapId:'ue5-6',q:"Pourquoi la lutte contre les inégalités est-elle aussi un enjeu de croissance ?",a:"Des inégalités excessives peuvent freiner la demande globale et la cohésion sociale."},
{ue:'UE5',chapId:'ue5-7',q:"Qu'est-ce que le libre-échange ?",a:"Une politique commerciale qui supprime les barrières aux échanges entre pays."},
{ue:'UE5',chapId:'ue5-7',q:"Qu'est-ce que le protectionnisme ?",a:"Une politique qui protège la production nationale par des barrières aux importations."},
{ue:'UE5',chapId:'ue5-7',q:"Quelle est l'idée de la théorie de l'avantage comparatif de Ricardo ?",a:"Chaque pays a intérêt à se spécialiser dans ce qu'il produit relativement le mieux, puis échanger."},
{ue:'UE5',chapId:'ue5-7',q:"Qu'est-ce qu'un investissement direct à l'étranger (IDE) ?",a:"Un investissement pour créer ou contrôler durablement une activité dans un autre pays."},
{ue:'UE5',chapId:'ue5-7',q:"Qu'est-ce que la balance des transactions courantes ?",a:"Le solde des échanges de biens, services et revenus d'un pays avec le reste du monde."},
{ue:'UE5',chapId:'ue5-7',q:"Qu'est-ce que l'OMC ?",a:"L'Organisation Mondiale du Commerce, qui régule le commerce international."},
{ue:'UE5',chapId:'ue5-7',q:"Qu'est-ce qu'un bien public mondial ?",a:"Un bien dont les bénéfices profitent à l'ensemble de la planète (ex : lutte climatique)."},
{ue:'UE5',chapId:'ue5-7',q:"Qu'est-ce que la fragmentation des chaînes de valeur mondiales ?",a:"La répartition des étapes de production d'un bien entre plusieurs pays."},
{ue:'UE5',chapId:'ue5-7',q:"Qu'est-ce qu'un accord commercial préférentiel/régional (ACP/ARP) ?",a:"Un accord réduisant les barrières entre un nombre limité de pays, hors cadre OMC."},
{ue:'UE5',chapId:'ue5-7',q:"Quelle est une limite souvent soulignée du libre-échange ?",a:"Il peut accroître les inégalités et avoir un impact environnemental négatif."},
{ue:'UE5',chapId:'ue5-7',q:"Qu'est-ce que la compétitivité prix d'un pays ?",a:"La capacité à proposer des prix inférieurs à ceux des concurrents étrangers."},
{ue:'UE5',chapId:'ue5-7',q:"Qu'est-ce que la compétitivité hors-prix ?",a:"La capacité à se différencier par la qualité, l'innovation ou l'image de marque."},
{ue:'UE5',chapId:'ue5-7',q:"Qu'est-ce qu'une dévaluation compétitive ?",a:"Une baisse volontaire de la valeur d'une monnaie pour rendre les exportations moins chères."},
{ue:'UE5',chapId:'ue5-7',q:"Qu'est-ce qu'une zone de libre-échange ?",a:"Un espace où les membres suppriment les barrières entre eux, gardant leur politique envers les tiers."},
{ue:'UE5',chapId:'ue5-7',q:"Différence entre zone de libre-échange et union douanière ?",a:"L'union douanière ajoute un tarif extérieur commun envers les pays tiers."},
{ue:'UE5',chapId:'ue5-7',q:"Qu'est-ce que le dumping social ?",a:"Produire dans des pays à faibles normes sociales pour réduire les coûts."},
{ue:'UE5',chapId:'ue5-7',q:"Qu'est-ce qu'une firme multinationale (FMN) ?",a:"Une entreprise possédant ou contrôlant des unités de production dans plusieurs pays."},
{ue:'UE5',chapId:'ue5-7',q:"Qu'est-ce que la délocalisation ?",a:"Le transfert d'une activité de production vers un pays étranger, souvent pour réduire les coûts."},
{ue:'UE5',chapId:'ue5-7',q:"Qu'est-ce que le protectionnisme éducateur ?",a:"Une protection temporaire permettant à une industrie naissante de se développer."},
{ue:'UE5',chapId:'ue5-7',q:"Qu'est-ce que la souveraineté économique ?",a:"La capacité d'un pays à maîtriser ses choix économiques stratégiques."},
{ue:'UE8',chapId:'ue8-1',q:"Quelle est la différence entre donnée, information et connaissance ?",a:"La donnée est un fait brut ; l'information est une donnée mise en contexte ; la connaissance résulte de son appropriation par un individu."},
{ue:'UE8',chapId:'ue8-1',q:"Cite les 5 critères de qualité de l'information.",a:"Accessibilité, exactitude, actualité, pertinence, exhaustivité."},
{ue:'UE8',chapId:'ue8-1',q:"Quelles sont les 5 fonctions du système d'information ?",a:"Collecter, traiter, stocker, diffuser et sécuriser."},
{ue:'UE8',chapId:'ue8-1',q:"Quels sont les 3 rôles du système d'information dans une organisation ?",a:"Opérationnel, tactique et stratégique."},
{ue:'UE8',chapId:'ue8-1',q:"Cite les 4 types de ressources interreliées du système d'information.",a:"Matérielles, logicielles, données et procédures."},
{ue:'UE8',chapId:'ue8-1',q:"Qui sont les acteurs internes du SI dans une organisation ?",a:"Utilisateurs, DSI/gestionnaires, chefs de projet, développeurs, responsable infrastructures, Data Scientist/Analyst, RSSI."},
{ue:'UE8',chapId:'ue8-1',q:"Qui sont les acteurs externes du SI ?",a:"Utilisateurs et partenaires (clients, fournisseurs), ESN, éditeurs de logiciels."},
{ue:'UE8',chapId:'ue8-1',q:"Qu'est-ce qu'une ESN ?",a:"Une Entreprise de Services du Numérique, qui propose des prestations informatiques à d'autres organisations."},
{ue:'UE8',chapId:'ue8-1',q:"Qu'est-ce que l'interopérabilité des données ?",a:"La capacité de différents systèmes à échanger et utiliser mutuellement des informations."},
{ue:'UE8',chapId:'ue8-1',q:"Quel langage à balises est utilisé pour l'échange de données de gestion ?",a:"Le XML."},
{ue:'UE8',chapId:'ue8-1',q:"Qu'est-ce qu'un cahier des charges ?",a:"Un document qui formalise les besoins du client pour un projet informatique confié à un prestataire."},
{ue:'UE8',chapId:'ue8-1',q:"Différence entre maîtrise d'ouvrage et maîtrise d'œuvre ?",a:"La maîtrise d'ouvrage est le commanditaire ; la maîtrise d'œuvre réalise techniquement le projet."},
{ue:'UE8',chapId:'ue8-1',q:"Qu'est-ce que l'informatique en nuage (cloud) ?",a:"Un mode d'hébergement où données et applications sont stockées sur des serveurs distants via Internet."},
{ue:'UE8',chapId:'ue8-1',q:"Qu'est-ce que l'externalisation du système d'information ?",a:"Confier tout ou partie de la gestion du SI à un prestataire extérieur."},
{ue:'UE8',chapId:'ue8-1',q:"Qu'est-ce qu'un audit du système d'information ?",a:"Une évaluation méthodique du SI identifiant ses forces, faiblesses et besoins d'évolution."},
{ue:'UE8',chapId:'ue8-1',q:"Qu'est-ce que l'urbanisation du système d'information ?",a:"Une démarche organisant le SI de façon cohérente et évolutive, comme l'urbanisme d'une ville."},
{ue:'UE8',chapId:'ue8-1',q:"Qu'est-ce que la transition numérique d'une organisation ?",a:"Le processus de transformation des pratiques sous l'effet des technologies numériques."},
{ue:'UE8',chapId:'ue8-1',q:"Qu'est-ce qu'un document électronique légal ?",a:"Un document dématérialisé ayant une valeur juridique équivalente au papier."},
{ue:'UE8',chapId:'ue8-1',q:"Que doit préciser un contrat de prestations de services informatiques ?",a:"Les obligations des parties, les niveaux de service attendus, les responsabilités et modalités de résiliation."},
{ue:'UE8',chapId:'ue8-1',q:"Pourquoi la sécurité est-elle citée comme une fonction du SI dès la première partie du programme ?",a:"Parce qu'elle est indissociable des autres fonctions, même si approfondie dans une partie dédiée."},
{ue:'UE8',chapId:'ue8-2',q:"Qu'est-ce qu'une base de données ?",a:"Un ensemble structuré de données organisées pour être stockées, gérées et exploitées efficacement."},
{ue:'UE8',chapId:'ue8-2',q:"Qu'est-ce qu'un SGBD ?",a:"Un système de gestion de base de données, logiciel qui permet de créer, manipuler et administrer une base."},
{ue:'UE8',chapId:'ue8-2',q:"Qu'est-ce qu'une table, en base de données relationnelle ?",a:"Une structure en lignes (enregistrements) et colonnes (champs) sur un même sujet."},
{ue:'UE8',chapId:'ue8-2',q:"Qu'est-ce qu'une clé primaire ?",a:"Un champ qui identifie de façon unique chaque enregistrement d'une table."},
{ue:'UE8',chapId:'ue8-2',q:"Qu'est-ce qu'une clé étrangère ?",a:"Un champ qui fait référence à la clé primaire d'une autre table."},
{ue:'UE8',chapId:'ue8-2',q:"Qu'est-ce que le langage SQL ?",a:"Le langage standard pour interroger et manipuler les données d'une base relationnelle."},
{ue:'UE8',chapId:'ue8-2',q:"Que fait une requête SQL de type SELECT ?",a:"Elle extrait et affiche des données selon des critères définis."},
{ue:'UE8',chapId:'ue8-2',q:"Qu'est-ce qu'une jointure entre tables ?",a:"Une opération qui combine les données de plusieurs tables à partir d'un champ commun."},
{ue:'UE8',chapId:'ue8-2',q:"Qu'est-ce que l'intégrité référentielle ?",a:"La garantie que les relations entre tables restent cohérentes."},
{ue:'UE8',chapId:'ue8-2',q:"Qu'est-ce qu'une macro dans un tableur ?",a:"Une séquence d'instructions enregistrée ou programmée qui automatise une tâche répétitive."},
{ue:'UE8',chapId:'ue8-2',q:"Qu'est-ce qu'un tableau croisé dynamique ?",a:"Un outil du tableur qui synthétise et croise de grandes quantités de données."},
{ue:'UE8',chapId:'ue8-2',q:"Qu'est-ce que la validation des données dans un tableur ?",a:"Une fonctionnalité qui restreint les valeurs saisissables dans une cellule."},
{ue:'UE8',chapId:'ue8-2',q:"Qu'est-ce que la programmation appliquée à l'automatisation des traitements ?",a:"L'écriture de scripts ou macros exécutant automatiquement des tâches répétitives."},
{ue:'UE8',chapId:'ue8-2',q:"Qu'est-ce qu'un algorithme ?",a:"Une suite finie et ordonnée d'instructions pour résoudre un problème."},
{ue:'UE8',chapId:'ue8-2',q:"Pourquoi la qualité des données est-elle un enjeu de gestion majeur ?",a:"Des données erronées ou incomplètes faussent les analyses et les décisions."},
{ue:'UE8',chapId:'ue8-2',q:"Qu'est-ce qu'un doublon dans une base de données ?",a:"Un enregistrement dupliqué qui nuit à la fiabilité de l'information."},
{ue:'UE8',chapId:'ue8-2',q:"Qu'est-ce qu'un data warehouse (entrepôt de données) ?",a:"Une base de données centralisée regroupant des données de plusieurs sources pour l'analyse."},
{ue:'UE8',chapId:'ue8-2',q:"Quel format de fichier est couramment utilisé pour l'échange de données tabulaires ?",a:"Le format CSV."},
{ue:'UE8',chapId:'ue8-2',q:"Qu'est-ce que le nettoyage de données (data cleaning) ?",a:"Corriger ou supprimer les données incorrectes, incomplètes ou redondantes."},
{ue:'UE8',chapId:'ue8-2',q:"Pourquoi automatiser un traitement de données présente-t-il un risque à maîtriser ?",a:"Une erreur dans l'automatisation peut se répéter et se propager sans contrôle immédiat."},
{ue:'UE8',chapId:'ue8-3',q:"Qu'est-ce qu'un processus, au sens organisationnel ?",a:"Un enchaînement d'activités coordonnées produisant un résultat ayant de la valeur pour un client."},
{ue:'UE8',chapId:'ue8-3',q:"Qu'est-ce qu'un processus métier ?",a:"Un processus directement lié à l'activité principale de l'organisation."},
{ue:'UE8',chapId:'ue8-3',q:"Qu'est-ce qu'un logigramme ?",a:"Une représentation graphique qui modélise les étapes et le déroulement d'un processus."},
{ue:'UE8',chapId:'ue8-3',q:"Qu'est-ce qu'un progiciel de gestion intégré (PGI/ERP) ?",a:"Un logiciel qui centralise et intègre l'ensemble des fonctions de gestion d'une organisation."},
{ue:'UE8',chapId:'ue8-3',q:"Quel est l'avantage principal d'un PGI ?",a:"Il évite la ressaisie des données et garantit leur cohérence entre services."},
{ue:'UE8',chapId:'ue8-3',q:"Qu'est-ce qu'un progiciel métier ?",a:"Un logiciel spécialisé répondant aux besoins d'un secteur ou d'une fonction précise."},
{ue:'UE8',chapId:'ue8-3',q:"Qu'est-ce que la modélisation des processus permet d'identifier ?",a:"Les dysfonctionnements, redondances et axes d'amélioration."},
{ue:'UE8',chapId:'ue8-3',q:"Qu'est-ce que le lien entre processus et données dans un SI ?",a:"Chaque étape d'un processus génère, modifie ou consulte des données à bien structurer."},
{ue:'UE8',chapId:'ue8-3',q:"Qu'est-ce que l'intelligence artificielle appliquée aux processus de gestion ?",a:"Des algorithmes capables d'apprendre et d'automatiser des tâches ou décisions."},
{ue:'UE8',chapId:'ue8-3',q:"Qu'est-ce que la RPA (Robotic Process Automation) ?",a:"Une technologie qui automatise des tâches répétitives en imitant les actions d'un utilisateur."},
{ue:'UE8',chapId:'ue8-3',q:"Qu'est-ce qu'un tableau de bord de pilotage ?",a:"Un outil qui synthétise des indicateurs clés pour suivre la performance."},
{ue:'UE8',chapId:'ue8-3',q:"Qu'est-ce qu'un indicateur de performance (KPI) ?",a:"Une mesure quantifiable qui évalue l'atteinte d'un objectif."},
{ue:'UE8',chapId:'ue8-3',q:"Qu'est-ce que la dématérialisation d'un processus ?",a:"Le remplacement des supports papier par des supports numériques."},
{ue:'UE8',chapId:'ue8-3',q:"Quel est l'impact des technologies émergentes sur les métiers de la gestion ?",a:"Automatisation des tâches répétitives et émergence de compétences d'analyse et de pilotage."},
{ue:'UE8',chapId:'ue8-3',q:"Qu'est-ce qu'un processus support ?",a:"Un processus ne créant pas de valeur directe pour le client mais nécessaire au fonctionnement interne."},
{ue:'UE8',chapId:'ue8-3',q:"Qu'est-ce qu'un acteur d'un processus, en modélisation ?",a:"Une personne ou entité responsable d'une ou plusieurs étapes du processus."},
{ue:'UE8',chapId:'ue8-3',q:"Qu'est-ce que l'interconnexion des progiciels métiers avec un PGI permet ?",a:"D'assurer la cohérence des données entre besoins spécifiques et gestion globale."},
{ue:'UE8',chapId:'ue8-3',q:"Qu'est-ce qu'un goulot d'étranglement dans un processus ?",a:"Une étape qui ralentit l'ensemble du processus, sa capacité étant inférieure aux besoins."},
{ue:'UE8',chapId:'ue8-3',q:"En quoi la performance d'un processus peut-elle être mesurée ?",a:"En termes de coût, de délai et de qualité du résultat obtenu."},
{ue:'UE8',chapId:'ue8-3',q:"Pourquoi la formalisation des processus est-elle utile avant d'informatiser une tâche ?",a:"Elle permet de comprendre l'existant et d'éviter d'automatiser un processus mal conçu."},
{ue:'UE8',chapId:'ue8-4',q:"Qu'est-ce que la cybersécurité ?",a:"L'ensemble des pratiques visant à protéger les systèmes informatiques contre les attaques et intrusions."},
{ue:'UE8',chapId:'ue8-4',q:"Qu'est-ce qu'un rançongiciel (ransomware) ?",a:"Un logiciel malveillant qui chiffre les données et exige une rançon pour les déverrouiller."},
{ue:'UE8',chapId:'ue8-4',q:"Qu'est-ce que le phishing (hameçonnage) ?",a:"Une technique frauduleuse visant à tromper un utilisateur pour lui soutirer des informations confidentielles."},
{ue:'UE8',chapId:'ue8-4',q:"Qu'est-ce que le RGPD ?",a:"Le Règlement Général sur la Protection des Données, encadrant le traitement des données personnelles."},
{ue:'UE8',chapId:'ue8-4',q:"Quels sont les grands principes du RGPD ?",a:"Licéité du traitement, minimisation des données, limitation de la conservation, droits des personnes."},
{ue:'UE8',chapId:'ue8-4',q:"Qu'est-ce qu'un DPO ?",a:"Le délégué à la protection des données, chargé de veiller à la conformité RGPD."},
{ue:'UE8',chapId:'ue8-4',q:"Qu'est-ce que l'authentification à deux facteurs ?",a:"Une méthode exigeant deux preuves d'identité distinctes pour accéder à un système."},
{ue:'UE8',chapId:'ue8-4',q:"Qu'est-ce qu'un pare-feu (firewall) ?",a:"Un dispositif qui filtre les flux entrants et sortants d'un réseau."},
{ue:'UE8',chapId:'ue8-4',q:"Qu'est-ce qu'une sauvegarde de données ?",a:"Une copie des données permettant leur restauration en cas de perte ou d'attaque."},
{ue:'UE8',chapId:'ue8-4',q:"Qu'est-ce que le principe de disponibilité en sécurité informatique ?",a:"La garantie que systèmes et données sont accessibles aux utilisateurs autorisés."},
{ue:'UE8',chapId:'ue8-4',q:"Qu'est-ce que le principe de confidentialité en sécurité informatique ?",a:"La garantie que seules les personnes autorisées accèdent à une information."},
{ue:'UE8',chapId:'ue8-4',q:"Qu'est-ce que le principe d'intégrité en sécurité informatique ?",a:"La garantie qu'une donnée n'est pas altérée de façon non autorisée."},
{ue:'UE8',chapId:'ue8-4',q:"Qu'est-ce que la loi REEN ?",a:"La loi visant à la Réduction de l'Empreinte Environnementale du Numérique."},
{ue:'UE8',chapId:'ue8-4',q:"Cite un impact environnemental négatif du numérique.",a:"La surconsommation énergétique des data centers et la multiplication des terminaux."},
{ue:'UE8',chapId:'ue8-4',q:"Cite un impact environnemental positif du numérique.",a:"La dématérialisation, qui peut réduire certains déplacements et la consommation de papier."},
{ue:'UE8',chapId:'ue8-4',q:"Qu'est-ce que l'écoconception numérique ?",a:"Concevoir des services numériques en limitant leur impact environnemental dès la conception."},
{ue:'UE8',chapId:'ue8-4',q:"Qu'est-ce qu'une faille de sécurité ?",a:"Une vulnérabilité d'un système informatique exploitable par une personne malveillante."},
{ue:'UE8',chapId:'ue8-4',q:"Qu'est-ce qu'un plan de continuité d'activité (PCA) ?",a:"Un dispositif permettant de maintenir ou reprendre rapidement l'activité après un incident majeur."},
{ue:'UE8',chapId:'ue8-4',q:"Quelles obligations encadrent la conservation des fichiers comptables informatisés ?",a:"Formats et durées légales définies, garantissant intégrité et accessibilité."},
{ue:'UE8',chapId:'ue8-4',q:"Pourquoi la sensibilisation des utilisateurs est-elle essentielle en cybersécurité ?",a:"La majorité des failles proviennent d'erreurs humaines."},
{ue:'UE9',chapId:'ue9-1',q:"Quelles sont les différentes dimensions de la comptabilité ?",a:"Une dimension juridique, économique et de communication/information."},
{ue:'UE9',chapId:'ue9-1',q:"Quel est le rôle principal de la comptabilité pour une organisation ?",a:"Produire une information financière fiable destinée aux différents utilisateurs."},
{ue:'UE9',chapId:'ue9-1',q:"Cite 3 partenaires de l'entreprise ayant besoin d'informations comptables.",a:"Les associés/actionnaires, les banques/créanciers, l'administration fiscale."},
{ue:'UE9',chapId:'ue9-1',q:"La comptabilité est-elle une branche du droit ?",a:"Oui, on parle de droit comptable, au même titre que le droit fiscal ou des sociétés."},
{ue:'UE9',chapId:'ue9-1',q:"Quelle est la relation entre comptabilité et fiscalité ?",a:"Les règles comptables servent souvent de base au calcul de l'impôt, avec des retraitements spécifiques."},
{ue:'UE9',chapId:'ue9-1',q:"Qu'est-ce que l'expert-comptable ?",a:"Un professionnel chargé de tenir, contrôler ou conseiller sur la comptabilité, membre de l'Ordre."},
{ue:'UE9',chapId:'ue9-1',q:"Qu'est-ce que le commissaire aux comptes ?",a:"Un professionnel chargé de certifier la régularité, sincérité et image fidèle des comptes, en indépendance."},
{ue:'UE9',chapId:'ue9-1',q:"Quelle est la différence entre expert-comptable et commissaire aux comptes ?",a:"L'expert-comptable établit/conseille ; le commissaire aux comptes certifie et contrôle en indépendance."},
{ue:'UE9',chapId:'ue9-1',q:"Qu'est-ce que l'Ordre des experts-comptables ?",a:"L'organisation professionnelle qui régule et représente la profession en France."},
{ue:'UE9',chapId:'ue9-1',q:"Qu'est-ce que le Plan Comptable Général (PCG) ?",a:"Le référentiel officiel français fixant les règles de comptabilisation et de présentation des comptes."},
{ue:'UE9',chapId:'ue9-1',q:"Qui élabore les normes comptables françaises actuellement ?",a:"L'Autorité des Normes Comptables (ANC)."},
{ue:'UE9',chapId:'ue9-1',q:"Qu'est-ce que l'image fidèle en comptabilité ?",a:"Le principe selon lequel les comptes doivent donner une représentation sincère et fidèle de la situation."},
{ue:'UE9',chapId:'ue9-1',q:"Quelles sont les missions principales de l'expert-comptable ?",a:"Tenue, révision, établissement des comptes, et conseil aux entreprises."},
{ue:'UE9',chapId:'ue9-1',q:"Qu'est-ce qu'une mission de présentation des comptes ?",a:"Une mission où l'expert-comptable atteste de la cohérence et vraisemblance des comptes."},
{ue:'UE9',chapId:'ue9-1',q:"Pourquoi la comptabilité est-elle qualifiée de 'langage des affaires' ?",a:"Elle traduit dans un langage normalisé et commun la situation économique d'une organisation."},
{ue:'UE9',chapId:'ue9-1',q:"Quelle institution supervise les commissaires aux comptes en France ?",a:"Le Haut Conseil du Commissariat aux Comptes (H3C)."},
{ue:'UE9',chapId:'ue9-1',q:"Qu'est-ce que le secret professionnel de l'expert-comptable ?",a:"L'obligation de confidentialité des informations dont il a connaissance dans sa mission."},
{ue:'UE9',chapId:'ue9-1',q:"Une entreprise a-t-elle toujours l'obligation de faire certifier ses comptes ?",a:"Non, cela dépend de seuils légaux (taille, chiffre d'affaires, effectif)."},
{ue:'UE9',chapId:'ue9-1',q:"Qu'est-ce que la responsabilité disciplinaire de l'expert-comptable ?",a:"La possibilité pour l'Ordre de sanctionner un manquement aux règles déontologiques."},
{ue:'UE9',chapId:'ue9-1',q:"Quel est le lien historique entre comptabilité et commerce ?",a:"La comptabilité s'est développée avec l'essor du commerce, notamment la partie double à la Renaissance."},
{ue:'UE9',chapId:'ue9-2',q:"Qu'est-ce qu'un actif, en comptabilité ?",a:"Un élément du patrimoine ayant une valeur positive, contrôlé, dont on attend des avantages futurs."},
{ue:'UE9',chapId:'ue9-2',q:"Qu'est-ce qu'un passif, en comptabilité ?",a:"Une obligation envers un tiers entraînant probablement une sortie de ressources."},
{ue:'UE9',chapId:'ue9-2',q:"Quels sont les documents comptables obligatoires ?",a:"Le livre-journal et le grand-livre."},
{ue:'UE9',chapId:'ue9-2',q:"Qu'est-ce que le livre-journal ?",a:"Le registre qui enregistre chronologiquement toutes les opérations comptables."},
{ue:'UE9',chapId:'ue9-2',q:"Qu'est-ce que le grand-livre ?",a:"Le document reprenant les écritures du journal, classées et regroupées par compte."},
{ue:'UE9',chapId:'ue9-2',q:"Qu'est-ce que la balance ?",a:"Un tableau récapitulant pour chaque compte débits, crédits et solde, pour contrôler l'équilibre."},
{ue:'UE9',chapId:'ue9-2',q:"Qu'est-ce que la comptabilité d'engagement ?",a:"Les opérations sont enregistrées au moment où elles sont engagées, indépendamment du règlement."},
{ue:'UE9',chapId:'ue9-2',q:"Qu'est-ce que la comptabilité de trésorerie ?",a:"Les opérations sont enregistrées au moment de l'encaissement ou du décaissement effectif."},
{ue:'UE9',chapId:'ue9-2',q:"Quelle comptabilité les entreprises françaises doivent-elles tenir en principe ?",a:"La comptabilité d'engagement."},
{ue:'UE9',chapId:'ue9-2',q:"Comment sont classés les comptes selon le PCG ?",a:"Par classes numérotées de 1 à 7 (1-5 pour le bilan, 6-7 pour le compte de résultat)."},
{ue:'UE9',chapId:'ue9-2',q:"Que représentent les comptes de classe 6 et 7 ?",a:"Les charges (classe 6) et les produits (classe 7), qui déterminent le résultat."},
{ue:'UE9',chapId:'ue9-2',q:"Qu'est-ce que le principe de la partie double ?",a:"Toute opération est enregistrée au débit et au crédit de comptes, pour un montant total égal."},
{ue:'UE9',chapId:'ue9-2',q:"Comment se traduit l'équilibre d'une écriture comptable ?",a:"Le total des débits doit toujours être égal au total des crédits."},
{ue:'UE9',chapId:'ue9-2',q:"Qu'est-ce que le bilan ?",a:"Le document présentant à une date donnée le patrimoine sous forme d'actif et de passif."},
{ue:'UE9',chapId:'ue9-2',q:"Qu'est-ce que le compte de résultat ?",a:"Le document récapitulant les charges et produits de l'exercice, pour déterminer le résultat."},
{ue:'UE9',chapId:'ue9-2',q:"Qu'est-ce qu'un grand-livre auxiliaire ?",a:"Un document facultatif détaillant les comptes individuels de tiers au sein d'un compte collectif."},
{ue:'UE9',chapId:'ue9-2',q:"Pourquoi établit-on la balance avant les comptes annuels ?",a:"Pour vérifier l'équilibre global de la comptabilité avant de présenter bilan et compte de résultat."},
{ue:'UE9',chapId:'ue9-2',q:"Qu'est-ce qu'une écriture comptable ?",a:"L'enregistrement d'une opération dans le journal : date, comptes, montants, libellé."},
{ue:'UE9',chapId:'ue9-2',q:"Que révèle un déséquilibre entre débits et crédits dans une balance ?",a:"Une erreur d'enregistrement à identifier et corriger avant d'établir les comptes annuels."},
{ue:'UE9',chapId:'ue9-2',q:"Pour un compte d'actif, une augmentation s'enregistre-t-elle au débit ou au crédit ?",a:"Au débit ; une diminution s'enregistre au crédit."},
{ue:'UE9',chapId:'ue9-3',q:"Comment enregistre-t-on une facture d'achat de marchandises (HT + TVA) ?",a:"Débit du compte d'achat (HT) et TVA déductible, crédit du compte fournisseur (TTC)."},
{ue:'UE9',chapId:'ue9-3',q:"Comment enregistre-t-on une facture de vente (HT + TVA) ?",a:"Débit du compte client (TTC), crédit du compte de vente (HT) et TVA collectée."},
{ue:'UE9',chapId:'ue9-3',q:"Qu'est-ce que la TVA déductible ?",a:"La TVA payée par l'entreprise sur ses achats, qu'elle peut récupérer auprès de l'État."},
{ue:'UE9',chapId:'ue9-3',q:"Qu'est-ce que la TVA collectée ?",a:"La TVA facturée aux clients sur les ventes, à reverser à l'État."},
{ue:'UE9',chapId:'ue9-3',q:"Comment calcule-t-on la TVA à décaisser ?",a:"TVA collectée moins TVA déductible."},
{ue:'UE9',chapId:'ue9-3',q:"Qu'est-ce qu'une réduction commerciale (rabais, remise, ristourne) ?",a:"Une diminution du prix accordée pour un motif commercial."},
{ue:'UE9',chapId:'ue9-3',q:"Comment traite-t-on une réduction commerciale figurant sur la facture initiale ?",a:"Elle diminue directement le montant brut ; seul le montant net est enregistré."},
{ue:'UE9',chapId:'ue9-3',q:"Qu'est-ce qu'un escompte de règlement ?",a:"Une réduction financière accordée pour un paiement anticipé."},
{ue:'UE9',chapId:'ue9-3',q:"Qu'est-ce que le lettrage des comptes ?",a:"Le rapprochement entre une facture enregistrée et son règlement."},
{ue:'UE9',chapId:'ue9-3',q:"Qu'est-ce qu'un état de rapprochement bancaire ?",a:"Un document qui explique les écarts entre le compte banque en comptabilité et le relevé bancaire."},
{ue:'UE9',chapId:'ue9-3',q:"Comment enregistre-t-on un acompte reçu d'un client ?",a:"Débit banque, crédit d'un compte d'avances et acomptes reçus sur commandes."},
{ue:'UE9',chapId:'ue9-3',q:"Comment traite-t-on les frais accessoires sur achat facturés par le fournisseur ?",a:"Ils sont en principe intégrés au coût d'achat."},
{ue:'UE9',chapId:'ue9-3',q:"Qu'est-ce qu'une lettre de change relevé magnétique (LCR) ?",a:"Un moyen de règlement dématérialisé mandatant la banque du fournisseur pour encaisser à échéance."},
{ue:'UE9',chapId:'ue9-3',q:"Comment fonctionne la TVA sur une acquisition intracommunautaire ?",a:"L'entreprise autoliquide la TVA : elle la collecte et la déduit simultanément."},
{ue:'UE9',chapId:'ue9-3',q:"Comment fonctionne la TVA sur une exportation hors UE ?",a:"L'exportation est exonérée de TVA française."},
{ue:'UE9',chapId:'ue9-3',q:"Qu'est-ce qu'un numéro d'identification intracommunautaire ?",a:"Un numéro de TVA propre à chaque entreprise pour les échanges au sein de l'UE."},
{ue:'UE9',chapId:'ue9-3',q:"Comment traite-t-on un emballage consigné ?",a:"Il fait l'objet d'un enregistrement distinct, avec restitution possible au retour de l'emballage."},
{ue:'UE9',chapId:'ue9-3',q:"Différence entre pièce justificative comptable et simple document commercial ?",a:"La facture constate un droit/obligation chiffrée ; un devis n'engendre aucun enregistrement."},
{ue:'UE9',chapId:'ue9-3',q:"Pourquoi le contrôle du lettrage est-il important ?",a:"Il vérifie que chaque facture a bien été réglée et identifie les créances/dettes en cours."},
{ue:'UE9',chapId:'ue9-3',q:"Comment enregistre-t-on le salaire brut dans les opérations relatives au personnel ?",a:"Débit d'un compte de charge de personnel, crédit des dettes envers personnel et organismes sociaux."},
{ue:'UE9',chapId:'ue9-4',q:"Pourquoi les entités réalisent-elles des opérations d'inventaire ?",a:"Pour donner une image fidèle du patrimoine et du résultat à la clôture de l'exercice."},
{ue:'UE9',chapId:'ue9-4',q:"Qu'est-ce que l'amortissement comptable d'une immobilisation ?",a:"La constatation de la perte de valeur liée à l'usage, au temps ou à l'obsolescence, répartie dans le temps."},
{ue:'UE9',chapId:'ue9-4',q:"Différence entre amortissement et dépréciation ?",a:"L'amortissement est irréversible et planifié ; la dépréciation est potentiellement réversible."},
{ue:'UE9',chapId:'ue9-4',q:"Qu'est-ce qu'une provision, en comptabilité ?",a:"Un passif dont l'échéance ou le montant n'est pas fixé précisément, mais probable."},
{ue:'UE9',chapId:'ue9-4',q:"Différence entre provision et charge à payer ?",a:"La provision est incertaine dans son montant/échéance ; la charge à payer est certaine et estimable."},
{ue:'UE9',chapId:'ue9-4',q:"Qu'est-ce que l'inventaire intermittent des stocks ?",a:"Le stock n'est constaté qu'une fois par an, par annulation du stock initial et constatation du final."},
{ue:'UE9',chapId:'ue9-4',q:"Comment enregistre-t-on la variation de stock à la clôture ?",a:"On annule le stock initial puis on constate le stock final."},
{ue:'UE9',chapId:'ue9-4',q:"Qu'est-ce que le principe du rattachement des charges et produits à l'exercice ?",a:"Chaque charge/produit doit être enregistré dans l'exercice auquel il se rapporte économiquement."},
{ue:'UE9',chapId:'ue9-4',q:"Qu'est-ce qu'une charge constatée d'avance ?",a:"Une charge déjà comptabilisée mais concernant en réalité l'exercice suivant."},
{ue:'UE9',chapId:'ue9-4',q:"Qu'est-ce qu'un produit constaté d'avance ?",a:"Un produit déjà comptabilisé mais concernant en réalité l'exercice suivant."},
{ue:'UE9',chapId:'ue9-4',q:"Qu'est-ce qu'une charge à payer ?",a:"Une charge de l'exercice non encore facturée à la clôture mais à rattacher à cet exercice."},
{ue:'UE9',chapId:'ue9-4',q:"Qu'est-ce qu'un produit à recevoir ?",a:"Un produit de l'exercice non encore facturé à la clôture mais à rattacher à cet exercice."},
{ue:'UE9',chapId:'ue9-4',q:"Quelles sont les 2 méthodes de valorisation des sorties de stock étudiées ?",a:"Le PEPS (premier entré, premier sorti) et le coût moyen pondéré (CMP)."},
{ue:'UE9',chapId:'ue9-4',q:"Comment fonctionne la méthode PEPS ?",a:"Les articles achetés en premier sont considérés comme sortis en premier."},
{ue:'UE9',chapId:'ue9-4',q:"Comment fonctionne le coût moyen pondéré ?",a:"Le coût de sortie est une moyenne pondérée recalculée à chaque nouvelle entrée."},
{ue:'UE9',chapId:'ue9-4',q:"Qu'est-ce qu'une reprise de dépréciation ou de provision ?",a:"L'annulation totale ou partielle d'une dépréciation/provision devenue sans objet."},
{ue:'UE9',chapId:'ue9-4',q:"Comment enregistre-t-on la sortie d'une immobilisation totalement amortie ?",a:"On solde le compte d'immobilisation et le compte d'amortissement cumulé pour la même valeur."},
{ue:'UE9',chapId:'ue9-4',q:"Qu'est-ce qui distingue une provision d'une dette classique ?",a:"La dette a un montant et une échéance certains ; la provision comporte une incertitude."},
{ue:'UE9',chapId:'ue9-4',q:"Pourquoi vérifier la cohérence bilan/compte de résultat après les écritures d'inventaire ?",a:"Pour s'assurer que les ajustements reflètent fidèlement l'activité de l'exercice."},
{ue:'UE9',chapId:'ue9-4',q:"Qu'est-ce qu'un tableau d'amortissement d'une immobilisation ?",a:"Un tableau détaillant, année par année, dotation, cumul et valeur nette comptable."},
{ue:'UE9',chapId:'ue9-5',q:"Que comprennent les comptes annuels d'une entité ?",a:"Le bilan, le compte de résultat et l'annexe."},
{ue:'UE9',chapId:'ue9-5',q:"Qu'est-ce que l'annexe des comptes annuels ?",a:"Un document qui complète et explique les informations chiffrées du bilan et du compte de résultat."},
{ue:'UE9',chapId:'ue9-5',q:"Pourquoi l'annexe est-elle indispensable ?",a:"Elle apporte les précisions nécessaires à l'interprétation correcte des chiffres."},
{ue:'UE9',chapId:'ue9-5',q:"Qu'est-ce que le résultat de l'exercice ?",a:"La différence entre produits et charges de l'exercice : bénéfice ou perte."},
{ue:'UE9',chapId:'ue9-5',q:"Où le résultat de l'exercice apparaît-il dans le bilan ?",a:"Dans les capitaux propres, au passif du bilan."},
{ue:'UE9',chapId:'ue9-5',q:"Qu'est-ce que le principe de permanence des méthodes ?",a:"Appliquer les mêmes méthodes comptables d'un exercice à l'autre, sauf changement justifié."},
{ue:'UE9',chapId:'ue9-5',q:"Qu'est-ce que le principe de prudence en comptabilité ?",a:"Ne jamais surestimer actifs/produits ni sous-estimer passifs/charges."},
{ue:'UE9',chapId:'ue9-5',q:"Qu'est-ce que le principe d'indépendance des exercices ?",a:"Rattacher à chaque exercice les charges et produits qui le concernent réellement."},
{ue:'UE9',chapId:'ue9-5',q:"Quelle obligation légale existe pour la diffusion des comptes annuels ?",a:"Le dépôt au greffe du tribunal de commerce, consultable au RCS."},
{ue:'UE9',chapId:'ue9-5',q:"Qu'est-ce qu'un exercice comptable ?",a:"La période, généralement 12 mois, sur laquelle sont établis les comptes annuels."},
{ue:'UE9',chapId:'ue9-5',q:"Qu'est-ce que la date de clôture de l'exercice ?",a:"La date à laquelle s'arrête l'exercice et à partir de laquelle sont réalisés les travaux d'inventaire."},
{ue:'UE9',chapId:'ue9-5',q:"Pourquoi certaines entreprises publient-elles leurs comptes annuels ?",a:"Pour respecter leurs obligations de transparence envers leurs partenaires."},
{ue:'UE9',chapId:'ue9-5',q:"Qu'est-ce que le principe de continuité d'exploitation ?",a:"Les comptes sont établis en supposant la poursuite de l'activité dans un avenir prévisible."},
{ue:'UE9',chapId:'ue9-5',q:"Que se passe-t-il si la continuité d'exploitation n'est plus respectée ?",a:"Les règles d'évaluation sont adaptées, notamment à la valeur de liquidation."},
{ue:'UE9',chapId:'ue9-5',q:"Qu'est-ce que le principe de non-compensation ?",a:"Les éléments d'actif/passif ou de charges/produits doivent être évalués séparément."},
{ue:'UE9',chapId:'ue9-5',q:"Qu'est-ce que le principe du coût historique ?",a:"Les biens sont enregistrés à leur coût d'acquisition d'origine, sans réévaluation systématique."},
{ue:'UE9',chapId:'ue9-5',q:"Qui approuve les comptes annuels d'une société ?",a:"L'assemblée générale des associés ou des actionnaires."},
{ue:'UE9',chapId:'ue9-5',q:"Dans quel délai les comptes annuels doivent-ils être approuvés après la clôture ?",a:"Dans les 6 mois suivant la clôture de l'exercice."},
{ue:'UE9',chapId:'ue9-5',q:"Qu'est-ce qu'un rapport de gestion ?",a:"Un document présentant la situation, l'évolution et les perspectives de l'entité."},
{ue:'UE9',chapId:'ue9-5',q:"Pourquoi la comparabilité des comptes est-elle importante ?",a:"Elle permet d'analyser l'évolution de la situation financière et de la performance dans le temps."},
{ue:'UE9',chapId:'ue9-6',q:"Qu'est-ce que le fichier des écritures comptables (FEC) ?",a:"Un fichier obligatoire regroupant les écritures comptables d'un exercice, exigible en contrôle fiscal."},
{ue:'UE9',chapId:'ue9-6',q:"Qu'est-ce que la déclaration sociale nominative (DSN) ?",a:"Une déclaration mensuelle dématérialisée transmettant aux organismes sociaux les informations salariés."},
{ue:'UE9',chapId:'ue9-6',q:"Qu'est-ce que la liasse fiscale ?",a:"L'ensemble des documents comptables et fiscaux transmis chaque année à l'administration fiscale."},
{ue:'UE9',chapId:'ue9-6',q:"Comment les entreprises déclarent-elles la TVA aujourd'hui ?",a:"De façon dématérialisée, via une déclaration électronique."},
{ue:'UE9',chapId:'ue9-6',q:"Qu'est-ce qu'un logiciel de comptabilité ?",a:"Un outil permettant de saisir, contrôler, valider et clôturer les écritures comptables."},
{ue:'UE9',chapId:'ue9-6',q:"Quelles sont les grandes étapes du traitement des écritures dans un logiciel ?",a:"Saisie, correction, validation et clôture."},
{ue:'UE9',chapId:'ue9-6',q:"Qu'est-ce que l'automatisation de la saisie comptable ?",a:"L'usage de l'OCR/IA pour extraire automatiquement les données des factures."},
{ue:'UE9',chapId:'ue9-6',q:"Quel est un avantage de l'évolution technologique pour la fonction comptable ?",a:"Un gain de temps et une réduction des erreurs de saisie manuelle."},
{ue:'UE9',chapId:'ue9-6',q:"Quel est un risque de l'évolution technologique pour la fonction comptable ?",a:"Une dépendance accrue aux outils numériques et de nouveaux risques de sécurité."},
{ue:'UE9',chapId:'ue9-6',q:"Comment l'évolution technologique modifie-t-elle le rôle du comptable ?",a:"Il se recentre sur le contrôle, l'analyse et le conseil plutôt que la saisie manuelle."},
{ue:'UE9',chapId:'ue9-6',q:"Qu'est-ce que la facturation électronique obligatoire ?",a:"L'obligation progressive d'émettre et recevoir les factures sous format électronique structuré."},
