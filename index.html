const COURSES = {
'ue1-1': `## L'essentiel
- Le droit français s'organise en 4 blocs de sources directes : **bloc constitutionnel** (Constitution, DDHC, PFRLR), **bloc international et européen** (traités, règlements, directives), **bloc de légalité** (lois, ordonnances) et **bloc réglementaire** (décrets, arrêtés).
- À ces sources directes s'ajoutent des **sources indirectes** : la jurisprudence, les usages professionnels et la doctrine, qui éclairent l'interprétation des textes sans avoir en elles-mêmes force de loi générale.
- La hiérarchie des normes veut qu'un texte inférieur ne puisse contredire un texte supérieur : un décret ne peut pas contredire une loi, une loi ne peut pas contredire la Constitution.
- La règle de droit se distingue de la règle morale par sa **sanction étatique** : elle est obligatoire et son non-respect est sanctionné par la puissance publique.

## Exemple concret
Un artisan boulanger veut savoir s'il peut ouvrir son commerce le dimanche. Il consultera d'abord la loi (bloc de légalité) qui fixe le principe du repos dominical, puis un éventuel décret d'application (bloc réglementaire) précisant les dérogations possibles — sans oublier que la jurisprudence peut avoir précisé comment ces textes s'appliquent à des cas similaires.

## Piège à l'examen
Les candidats confondent souvent **règlement** (au sens juridique, un acte du pouvoir exécutif français : décret, arrêté) et **règlement européen** (un acte de l'Union européenne, d'application directe dans tous les États membres) — deux notions homonymes mais totalement différentes.`,
'ue1-2': `## L'essentiel
- Un contrat n'est valable que si trois conditions sont réunies : le **consentement** (libre et éclairé), la **capacité** des parties à contracter, et un **contenu licite et certain**.
- La responsabilité civile **contractuelle** sanctionne l'inexécution d'un contrat ; la responsabilité **extracontractuelle** répare un dommage causé hors de tout lien contractuel.
- Trois éléments doivent être réunis pour engager une responsabilité civile : un **fait générateur**, un **préjudice réparable**, et un **lien de causalité** entre les deux.
- Certains évènements exonèrent de responsabilité : la **force majeure** (imprévisible, irrésistible, extérieure), le fait d'un tiers, ou la faute de la victime.

## Exemple concret
Un livreur renverse un piéton en vélo électrique sur un trottoir glissant. Le piéton doit démontrer le fait générateur (la conduite du livreur), son préjudice (les blessures) et le lien de causalité entre les deux pour engager la responsabilité extracontractuelle du livreur — l'entreprise qui l'emploie pouvant elle-même être recherchée comme commettant du fait de son préposé.

## Piège à l'examen
Ne pas confondre l'**inexécution contractuelle** (le vendeur ne livre pas la marchandise prévue au contrat) avec un dommage causé en marge de ce même contrat (le livreur casse un vase chez le client en livrant), qui peut relever de la responsabilité extracontractuelle.`,
'ue1-3': `## L'essentiel
- Par principe, **celui qui réclame l'exécution d'une obligation doit la prouver** (article 1353 du Code civil).
- Les modes de preuve principaux sont l'**écrit** (acte authentique reçu par un notaire, ou acte sous signature privée), le **témoignage**, la **présomption**, et l'**aveu**.
- Depuis la réforme de 2022, le patrimoine de l'**entrepreneur individuel** est automatiquement scindé en un patrimoine professionnel et un patrimoine personnel, ce dernier étant protégé des créanciers professionnels.
- La responsabilité **civile** (réparer un dommage) et la responsabilité **pénale** (sanctionner une infraction) peuvent se cumuler pour un même fait, sous certaines conditions.

## Exemple concret
Un plombier indépendant est poursuivi par un fournisseur pour une facture impayée de matériel professionnel. Grâce à la séparation automatique de patrimoine, seul son patrimoine professionnel peut être saisi — sa résidence personnelle reste protégée, sauf renonciation expresse.

## Piège à l'examen
Les candidats oublient souvent que la force probante d'un mode de preuve varie : un acte authentique fait foi jusqu'à inscription de faux, alors qu'un témoignage est laissé à l'appréciation souveraine du juge.`,
'ue5-1': `## L'essentiel
- Pour l'école néoclassique, la science économique étudie la **gestion de la rareté** : comment allouer des ressources limitées face à des besoins illimités.
- La **valeur ajoutée** d'une unité de production se calcule ainsi : production − consommations intermédiaires. Elle rémunère le travail, le capital et l'État.
- L'économie s'est **tertiarisée** : le poids des services dans l'activité économique a fortement augmenté au détriment de l'industrie et de l'agriculture.
- Les grands courants de pensée (libéral, keynésien, marxiste) proposent des lectures différentes du rôle de l'État et du marché, souvent en réaction à des évènements historiques (crise de 1929, Trente Glorieuses...).

## Exemple concret
Une boulangerie achète 100 € de farine et d'ingrédients (consommations intermédiaires) et vend pour 400 € de pain sur la journée : sa valeur ajoutée est de 300 €, qui servira à payer les salaires, les cotisations, et à dégager un profit.

## Piège à l'examen
Ne pas confondre **chiffre d'affaires** (le total des ventes) et **valeur ajoutée** (la richesse réellement créée, après déduction des consommations intermédiaires).`,
'ue5-2': `## L'essentiel
- La concurrence pure et parfaite repose sur 5 conditions : **atomicité**, **homogénéité des produits**, **libre entrée/sortie**, **transparence de l'information**, **mobilité des facteurs**.
- Face à cette situation théorique, la réalité présente des formes de **concurrence imparfaite** : monopole (un seul offreur), oligopole (peu d'offreurs), concurrence monopolistique (produits différenciés).
- Une **externalité** est un effet, positif ou négatif, de l'activité d'un agent sur un tiers, sans compensation monétaire (ex : pollution, recherche qui profite à tous).
- Les **biens collectifs** (non rivaux, non exclusifs) et les **asymétries d'information** sont deux autres formes de défaillances de marché justifiant une intervention publique.

## Exemple concret
Le marché des télécommunications françaises est un oligopole : un petit nombre d'opérateurs se partagent le marché et chacun peut influencer les prix, contrairement à un marché parfaitement concurrentiel.

## Piège à l'examen
Les candidats confondent souvent **externalité négative** et simple nuisance privée : une externalité suppose un tiers extérieur à la transaction qui subit un effet sans compensation.`,
'ue5-3': `## L'essentiel
- Le **financement direct** passe par les marchés (émission d'actions ou d'obligations) ; le **financement indirect** passe par un intermédiaire financier, la banque.
- Les banques créent de la monnaie via le crédit : c'est le principe de **création monétaire** ("les crédits font les dépôts").
- Un agent est à **capacité de financement** si son épargne dépasse son investissement (souvent les ménages), à **besoin de financement** dans le cas inverse (souvent les entreprises et l'État).
- La monnaie remplit trois fonctions : **unité de compte**, **intermédiaire des échanges**, **réserve de valeur**.

## Exemple concret
Une PME qui veut financer une nouvelle machine peut emprunter auprès de sa banque (financement indirect) ou, si elle est suffisamment grande, émettre des obligations directement sur le marché financier (financement direct).

## Piège à l'examen
Ne pas confondre financement **interne** (autofinancement par les bénéfices) et financement **indirect** (passage par une banque) : l'axe interne/externe et l'axe direct/indirect sont deux distinctions différentes.`,
'ue5-4': `## L'essentiel
- Le PIB se calcule selon 3 approches équivalentes : par la **production**, par les **revenus**, par les **dépenses**.
- Le PIB en **volume** (prix constants) permet de mesurer la croissance réelle, contrairement au PIB en **valeur** (prix courants) qui inclut l'effet de l'inflation.
- Le PIB a des limites : il ignore le bien-être, les inégalités et l'environnement — d'où le recours à des indicateurs alternatifs comme l'**IDH**.
- La croissance dépend des facteurs de production (capital, travail, ressources) et du **progrès technique**, dont Solow a montré qu'il explique une large part de la croissance non attribuable à l'accumulation de capital ou de travail.

## Exemple concret
Si le PIB français augmente de 5% en valeur mais que l'inflation est de 3%, la croissance réelle (en volume) n'est que d'environ 2% — c'est ce chiffre corrigé qui reflète la vraie évolution de la production.

## Piège à l'examen
Confondre **croissance** (augmentation quantitative du PIB) et **développement** (amélioration qualitative des conditions de vie) est une erreur classique.`,
'ue5-5': `## L'essentiel
- Musgrave distingue 3 fonctions de l'État : **allocation** des ressources, **redistribution** des revenus, **stabilisation** de l'activité économique.
- Le **déficit public** est le solde négatif d'une seule année ; la **dette publique** est le cumul de tous les déficits passés.
- La politique de **demande** (keynésienne) relance l'économie par la dépense publique ; la politique d'**offre** soutient la compétitivité des entreprises.
- La BCE a pour objectif prioritaire la **stabilité des prix**, et le Pacte de Stabilité et de Croissance encadre les déficits des États membres de la zone euro.

## Exemple concret
Face à une récession, un gouvernement keynésien pourrait augmenter les dépenses publiques (grands travaux, aides) pour relancer la demande, quitte à creuser temporairement le déficit.

## Piège à l'examen
Ne pas confondre politique **conjoncturelle** (réponse rapide à une fluctuation) et politique **structurelle** (réforme de long terme) — elles répondent à des horizons temporels différents.`,
'ue5-6': `## L'essentiel
- Le chômage **conjoncturel** est temporaire et lié aux fluctuations économiques ; le chômage **structurel** reflète des déséquilibres durables (inadéquation des qualifications, rigidités).
- Le taux de chômage au sens du **BIT** mesure les personnes sans emploi, disponibles et en recherche active — à distinguer du **halo du chômage**.
- Les politiques de l'emploi sont **actives** (formation, aide à l'embauche) ou **passives** (indemnisation).
- Les inégalités se mesurent avec la **courbe de Lorenz** et l'**indice de Gini** ; la **redistribution** vise à les corriger.

## Exemple concret
Un ancien salarié de l'industrie textile, secteur en déclin structurel, aura plus de mal à retrouver un emploi équivalent qu'un salarié touché par un simple ralentissement conjoncturel — d'où l'importance de politiques actives ciblées.

## Piège à l'examen
Attention à ne pas confondre le taux de chômage **au sens du BIT** (norme internationale) et le nombre d'inscrits à France Travail (norme administrative) : les deux mesures ne coïncident pas exactement.`,
'ue5-7': `## L'essentiel
- Le **libre-échange** supprime les barrières aux échanges (droits de douane, quotas) ; le **protectionnisme** les maintient pour protéger la production nationale.
- La théorie de l'**avantage comparatif** de Ricardo justifie la spécialisation de chaque pays dans ce qu'il produit relativement le mieux, puis l'échange.
- Les **IDE** (investissements directs à l'étranger) et la **fragmentation des chaînes de valeur mondiales** caractérisent la mondialisation productive actuelle.
- L'**OMC** régule le commerce mondial selon une logique multilatérale, de plus en plus concurrencée par des accords bilatéraux ou régionaux (ACP/ARP).

## Exemple concret
Un constructeur automobile peut faire fabriquer ses composants électroniques en Asie, assembler le véhicule en Europe de l'Est et le vendre en Europe de l'Ouest : une illustration de la fragmentation des chaînes de valeur mondiales.

## Piège à l'examen
Le libre-échange n'est pas unanimement bénéfique : il faut savoir nuancer ses effets (gains globaux de richesse, mais inégalités accrues et impact environnemental) plutôt que de le présenter comme systématiquement positif ou négatif.`,
'ue8-1': `## L'essentiel
- Donnée (fait brut), information (donnée en contexte), connaissance (appropriation par un individu) sont trois notions distinctes.
- Cinq fonctions du SI : collecter, traiter, stocker, diffuser, sécuriser ; trois rôles : opérationnel, tactique, stratégique.
- Acteurs internes (DSI, développeurs, RSSI...) et externes (ESN, éditeurs, partenaires) font vivre le SI.
- Maîtrise d'ouvrage (le client) et maîtrise d'œuvre (le prestataire) structurent tout projet numérique.
- L'urbanisation du SI vise une organisation cohérente et évolutive du système d'information.

## Exemple concret
Une PME utilisant depuis plusieurs années des outils informatiques disparates (un logiciel de comptabilité, un tableur pour le suivi commercial, une messagerie séparée) décide de réaliser un audit de son système d'information. Ce diagnostic révèle une absence de communication entre ces outils, entraînant des ressaisies manuelles et des risques d'erreur. L'entreprise pourrait alors envisager d'externaliser le développement d'un progiciel de gestion intégré (PGI) auprès d'une ESN, sur la base d'un cahier des charges précisant ses besoins (maîtrise d'ouvrage), afin de centraliser et fiabiliser son information de gestion.

## Piège à l'examen
Ne confondez pas la donnée et l'information : une donnée seule (par exemple « 45 ») n'a de sens que replacée dans un contexte qui en fait une information (« 45 000 € de chiffre d'affaires en janvier »). De même, gardez à l'esprit que la maîtrise d'ouvrage exprime le besoin tandis que la maîtrise d'œuvre le réalise techniquement — une confusion fréquente inverse ces deux rôles.`,
'ue8-2': `## L'essentiel
- Une base de données relationnelle organise l'information en tables reliées par des clés primaires et étrangères.
- Le SQL permet d'interroger les données ; les jointures combinent des informations issues de plusieurs tables.
- L'intégrité référentielle garantit la cohérence des relations entre tables.
- Le tableau croisé dynamique et la validation des données sont des outils clés du tableur pour la gestion.
- L'automatisation (macros, programmation) gagne en efficacité mais nécessite un contrôle rigoureux de fiabilité.

## Exemple concret
Une entreprise commerciale gère ses données clients dans une table, ses données produits dans une deuxième table, et ses commandes dans une troisième table, reliée aux deux premières par des clés étrangères. Une requête SQL avec jointure permet d'obtenir, pour une période donnée, la liste des commandes avec le nom du client et la désignation du produit correspondants, sans avoir eu besoin de dupliquer ces informations dans la table des commandes elle-même — illustrant concrètement l'intérêt du modèle relationnel pour éviter la redondance des données.

## Piège à l'examen
Ne confondez pas clé primaire (identifiant unique au sein d'une table) et clé étrangère (référence vers la clé primaire d'une autre table) : ce sont deux notions complémentaires mais différentes, souvent confondues dans les copies. Retenez également que l'automatisation d'un traitement ne supprime jamais le besoin de contrôle humain : elle déplace ce contrôle en amont, lors de la conception du traitement, plutôt qu'à chaque exécution.`,
'ue8-3': `## L'essentiel
- Un processus est un enchaînement d'activités coordonnées créant de la valeur pour un client interne ou externe.
- Le logigramme modélise graphiquement les étapes, décisions et acteurs d'un processus.
- Un PGI intègre l'ensemble des fonctions de gestion et élimine la ressaisie de données entre services.
- Les progiciels métiers répondent à des besoins sectoriels spécifiques, souvent interconnectés au PGI global.
- L'IA et la RPA automatisent des tâches répétitives et transforment les compétences attendues des métiers de gestion.

## Exemple concret
Une entreprise identifie, grâce à la modélisation de son processus de facturation, un goulot d'étranglement au niveau de la validation manuelle des factures par un unique responsable, qui ralentit l'ensemble du cycle de facturation. La mise en place d'un module de PGI dédié à la facturation, couplé à une automatisation partielle des contrôles de cohérence par RPA, permettrait de fluidifier ce processus tout en libérant le responsable pour des tâches de contrôle à plus forte valeur ajoutée, comme l'analyse des anomalies détectées.

## Piège à l'examen
Ne présentez jamais l'automatisation d'un processus comme une simple substitution technique : elle suppose au préalable une bonne compréhension et une éventuelle refonte du processus existant, faute de quoi elle ne fait que reproduire plus rapidement des inefficacités déjà présentes. Distinguez également bien processus métier (créateur de valeur pour le client) et processus support (nécessaire au fonctionnement interne mais sans valeur directe pour le client final).`,
'ue8-4': `## L'essentiel
- Le RGPD encadre la collecte et le traitement des données personnelles selon les principes de licéité, minimisation et limitation de conservation.
- La sécurité informatique repose sur trois principes : disponibilité, intégrité, confidentialité (DIC).
- Rançongiciel et phishing sont deux menaces informatiques majeures ; pare-feu, authentification à deux facteurs et sauvegardes sont des dispositifs de protection clés.
- La majorité des failles de sécurité proviennent d'erreurs humaines, d'où l'importance de la sensibilisation.
- La loi REEN encadre les pratiques numériques responsables face aux impacts environnementaux du numérique.

## Exemple concret
Une entreprise victime d'une attaque par rançongiciel constate que ses données comptables sont chiffrées et inaccessibles. Grâce à un plan de continuité d'activité prévoyant des sauvegardes régulières et externalisées de ses données, elle parvient à restaurer son système sans céder à la demande de rançon, limitant ainsi l'impact de l'attaque sur son activité. Cet exemple illustre l'importance cruciale des sauvegardes régulières, l'un des dispositifs les plus simples et les plus efficaces de la politique de sécurité informatique.

## Piège à l'examen
Ne réduisez jamais la cybersécurité aux seuls dispositifs techniques : le programme insiste explicitement sur le facteur humain, à l'origine de la majorité des incidents de sécurité. De même, gardez à l'esprit que la durabilité numérique s'aborde ici de façon qualitative (bonnes pratiques, sensibilisation) et non quantitative (pas de calcul de bilan carbone ni d'analyse de cycle de vie détaillée attendus dans ce programme).`,
'ue9-1': `## L'essentiel
- La comptabilité a une triple dimension : juridique (obligation, preuve), économique (mesure de la richesse) et de communication.
- Le PCG, élaboré par l'ANC, est le référentiel normatif français ; le principe d'image fidèle en constitue le fondement.
- L'expert-comptable établit, révise et conseille ; le commissaire aux comptes certifie de façon indépendante.
- L'obligation de certification par un commissaire aux comptes dépend de seuils légaux liés à la taille de l'entité.
- La profession comptable est soumise au secret professionnel et à une déontologie encadrée par des instances dédiées (Ordre, H3C).

## Exemple concret
Une jeune entreprise en création s'interroge sur ses obligations comptables et sur l'opportunité de recourir à un expert-comptable. Compte tenu de sa taille modeste, elle n'est pas tenue de faire certifier ses comptes par un commissaire aux comptes, mais elle demeure tenue de produire une comptabilité régulière conforme au PCG. Elle décide de confier sa comptabilité à un expert-comptable, qui pourra à la fois assurer la fiabilité de l'information produite et la conseiller dans ses choix de gestion — illustrant la complémentarité entre les deux grandes fonctions de la profession comptable : établir/conseiller d'une part, certifier/contrôler de façon indépendante d'autre part.

## Piège à l'examen
Ne confondez jamais expert-comptable et commissaire aux comptes : le premier peut établir ou aider à établir les comptes qu'il conseille, tandis que le second doit impérativement être indépendant de l'entité dont il certifie les comptes — il ne peut donc pas être à la fois celui qui établit et celui qui certifie les mêmes comptes.`,
'ue9-2': `## L'essentiel
- Un actif procure des avantages économiques futurs ; un passif est une obligation entraînant une sortie de ressources probable.
- La comptabilité d'engagement rattache les opérations à leur date d'engagement, indépendamment du règlement effectif.
- Les classes 1 à 5 du PCG affectent le bilan ; les classes 6 et 7 affectent le compte de résultat.
- Le principe de la partie double impose l'égalité entre le total des débits et le total des crédits de toute écriture.
- Journal (enregistrement chronologique) et grand-livre (classement par compte) sont les deux registres comptables obligatoires ; la balance contrôle leur équilibre.

## Exemple concret
Une entreprise reçoit une facture d'achat de fournitures de bureau d'un montant de 1 200 € HT, majoré de 240 € de TVA, soit 1 440 € TTC, réglée à crédit. L'écriture comptable correspondante enregistre au débit le compte de charge « Achats de fournitures » pour 1 200 €, au débit le compte « TVA déductible » pour 240 €, et au crédit le compte « Fournisseurs » pour 1 440 € : le total des débits (1 440 €) est bien égal au total du crédit (1 440 €), conformément au principe de la partie double.

## Piège à l'examen
Le sens du débit et du crédit n'est jamais absolu : il dépend de la nature du compte concerné (actif, passif, charge, produit). Une augmentation s'enregistre au débit pour un compte d'actif ou de charge, mais au crédit pour un compte de passif ou de produit — c'est l'erreur la plus fréquente des candidats débutants en comptabilité. Vérifiez systématiquement, sur chaque écriture, que le total des débits est bien égal au total des crédits avant de considérer votre travail terminé.`,
'ue9-3': `## L'essentiel
- Seule la facture (et non le devis ou le bon de commande) donne lieu à un enregistrement comptable.
- TVA collectée (sur les ventes) moins TVA déductible (sur les achats) donne la TVA à décaisser ou le crédit de TVA.
- Les réductions commerciales figurant sur facture diminuent directement le montant net enregistré.
- Le lettrage rapproche factures et règlements pour justifier le solde des comptes de tiers.
- Emprunt bancaire, crédit-bail, compte courant d'associé, affacturage et escompte de LCR sont les principales sources de financement étudiées en UE9.

## Exemple concret
Une entreprise vend des marchandises pour 5 000 € HT à un client français, avec une TVA au taux normal de 20 %, soit 1 000 € de TVA collectée, pour un total de 6 000 € TTC réglé à 30 jours. L'écriture comptable débite le compte « Clients » pour 6 000 €, crédite le compte « Ventes de marchandises » pour 5 000 € et le compte « TVA collectée » pour 1 000 €. Lors du règlement 30 jours plus tard, une nouvelle écriture débite le compte « Banque » et crédite le compte « Clients » pour 6 000 €, soldant ainsi la créance — ces deux écritures pouvant ensuite être lettrées pour justifier que la facture a bien été intégralement réglée.

## Piège à l'examen
Attention à ne jamais enregistrer un devis ou un bon de commande en comptabilité : seule la facture, pièce justificative comptable, donne lieu à une écriture. De même, sur les opérations intracommunautaires, retenez bien le mécanisme de l'autoliquidation : la TVA est à la fois collectée et déduite dans la même écriture, sans décaissement de trésorerie, ce qui surprend souvent les candidats habitués au schéma classique achat/vente en France.`,
'ue9-4': `## L'essentiel
- L'inventaire intermittent annule le stock initial puis constate le stock final à la clôture.
- L'amortissement est une perte de valeur irréversible et planifiée ; la dépréciation est une perte de valeur probable mais réversible.
- Une provision se distingue d'une dette (montant/échéance certains) et d'une charge à payer (montant certain, facture non reçue) par l'incertitude qui l'entoure.
- Les charges/produits constatés d'avance et les charges/produits à payer ou à recevoir permettent de rattacher chaque exercice aux charges et produits qui le concernent réellement.
- PEPS et coût moyen pondéré sont les deux méthodes de valorisation des stocks et titres étudiées.

## Exemple concret
Une entreprise a souscrit, le 1er septembre N, une assurance annuelle de 1 200 € couvrant la période du 1er septembre N au 31 août N+1, entièrement comptabilisée en charge lors de son règlement. À la clôture de l'exercice au 31 décembre N, seuls 4 mois de couverture (septembre à décembre) concernent réellement l'exercice N, soit 400 € ; les 8 mois restants (janvier à août N+1), soit 800 €, doivent être neutralisés du résultat de l'exercice N via une charge constatée d'avance, afin de respecter le principe d'indépendance des exercices.

## Piège à l'examen
La distinction entre provision, dette et charge à payer est l'un des points les plus fréquemment mal maîtrisés : une provision comporte toujours une incertitude (sur le montant ou l'échéance), alors qu'une dette ou une charge à payer ont un montant certain ou précisément estimable. Vérifiez également systématiquement le sens de l'ajustement (charge constatée d'avance retire une charge du résultat, charge à payer en ajoute une) : une inversion de sens est une erreur très fréquente et lourdement sanctionnée.`,
'ue9-5': `## L'essentiel
- Les comptes annuels comprennent bilan, compte de résultat et annexe, formant un tout indissociable.
- Le résultat de l'exercice, calculé au compte de résultat, vient compléter les capitaux propres au bilan.
- Cinq grands principes gouvernent l'établissement des comptes : permanence des méthodes, prudence, indépendance des exercices, continuité d'exploitation, non-compensation (et coût historique).
- Les comptes annuels sont approuvés par l'assemblée générale, généralement dans les six mois suivant la clôture.
- Le dépôt légal des comptes au greffe garantit leur transparence vis-à-vis des partenaires économiques.

## Exemple concret
Une société clôture son exercice au 31 décembre N avec un résultat bénéficiaire de 45 000 €. Ce montant vient augmenter les capitaux propres au passif de son bilan d'ouverture de l'exercice N+1, assurant ainsi la continuité et la cohérence entre les comptes des deux exercices successifs. L'assemblée générale des associés, réunie avant le 30 juin N+1, devra approuver ces comptes et statuer sur l'affectation du résultat (mise en réserve, distribution de dividendes, ou report à nouveau).

## Piège à l'examen
Ne négligez jamais l'annexe dans vos réponses : elle est trop souvent oubliée par les candidats alors qu'elle constitue, avec le bilan et le compte de résultat, l'un des trois documents indissociables des comptes annuels, expressément prévue par le programme. Attention également à ne pas confondre le principe de prudence (ne jamais surestimer actifs/produits ni sous-estimer passifs/charges) avec le principe de continuité d'exploitation (présomption de poursuite d'activité) : ce sont deux principes distincts, parfois confondus par les candidats.`,
'ue9-6': `## L'essentiel
- FEC, DSN, liasse fiscale et déclaration de TVA constituent les principaux fichiers et déclarations informatisés obligatoires de la fonction comptable.
- Les documents comptables doivent être conservés dans des conditions garantissant leur intégrité, en principe pendant dix ans.
- Un logiciel comptable permet la saisie, la correction, la validation et la clôture des écritures.
- L'automatisation de la saisie (OCR, IA) accélère le traitement mais ne supprime jamais le besoin de contrôle humain.
- La confidentialité et la sauvegarde des données comptables sont des obligations essentielles, renforcées par la sensibilité de ces informations.

## Exemple concret
Un cabinet comptable met en place un outil d'automatisation de la saisie des factures fournisseurs de ses clients, fondé sur la reconnaissance optique de caractères. Cet outil génère automatiquement une proposition d'écriture pour chaque facture scannée, qu'un collaborateur du cabinet doit ensuite valider après vérification de sa cohérence (montant, taux de TVA appliqué, compte de charge imputé). Cette organisation illustre la complémentarité entre automatisation technologique et contrôle humain : l'outil accélère la saisie, mais ne remplace pas la vérification finale exercée par le comptable, garante de la fiabilité des comptes produits.

## Piège à l'examen
Ne présentez jamais l'automatisation comme une suppression pure et simple du rôle du comptable : le programme insiste explicitement sur la nécessité du contrôle humain des écritures générées automatiquement, qui reste une compétence-clé attendue des candidats. Le rôle du comptable se transforme, il ne disparaît pas.`,

const BOX_INTERVALS = [1,2,4,7,14,30];
const STORAGE_KEY = 'dcg_app_state_v3';
const TIMER_PRESETS = [15,30,45,60,90,180];

  tab:'accueil', revealAnswer:false, ueFilter:'all', reviewMode:'due',

  timer:{ totalSec:0, remainingSec:0, running:false }

function todayStr(){ return new Date().toISOString().slice(0,10); }
function addDaysISO(iso, days){ const d=new Date(iso+'T00:00:00'); d.setDate(d.getDate()+days); return d.toISOString().slice(0,10); }
function uid(prefix){ return prefix+'_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,7); }
function formatTime(s){ s=Math.max(0,s); const m=Math.floor(s/60), r=s%60; return String(m).padStart(2,'0')+':'+String(r).padStart(2,'0'); }

function defaultState(){
  const today = todayStr();
  return {
    flashcards: SEED_FLASHCARDS.map(c => ({ id:uid('fc'), ue:c.ue, chapId:c.chapId, question:c.q, answer:c.a, box:0, due:today, lastReviewed:null, custom:false })),
    stats: { streak:0, lastActiveDate:null, totalReviews:0, sessionsCompleted:0 }
  };
}
function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){ state = JSON.parse(raw); if(!state.stats) state.stats = { streak:0, lastActiveDate:null, totalReviews:0, sessionsCompleted:0 }; return; }
  }catch(e){ console.error('Lecture impossible', e); }
  state = defaultState();
  saveState();
}
function saveState(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  catch(e){ console.error('Sauvegarde impossible', e); }
}

/* ============================= SRS LOGIC ============================= */
function dueFlashcards(list){ const today = todayStr(); return list.filter(c => c.due <= today); }
function filteredFlashcards(){
  let list = state.flashcards;
  if(ui.ueFilter !== 'all') list = list.filter(c => c.ue === ui.ueFilter);
  if(ui.reviewMode === 'due') list = dueFlashcards(list);
  return list;
}
function markActivityToday(){
  const today = todayStr();
  if(state.stats.lastActiveDate === today) return;
  const yesterday = addDaysISO(today, -1);
  state.stats.streak = (state.stats.lastActiveDate === yesterday) ? state.stats.streak + 1 : 1;
  state.stats.lastActiveDate = today;
}
function rateCard(card, rating){
  if(rating==='dur') card.box = 0;
  else if(rating==='facile') card.box = Math.min(card.box+1, BOX_INTERVALS.length-1);
  const interval = BOX_INTERVALS[card.box];
  card.due = addDaysISO(todayStr(), interval);
  card.lastReviewed = todayStr();
  state.stats.totalReviews++;
  markActivityToday();
}

/* ============================= MARKDOWN (mini) ============================= */
function escapeHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function inlineMd(s){ return escapeHtml(s).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>'); }
function mdToHtml(md){
  if(!md) return '';
  const blocks = md.split(/\n\s*\n/);
  return blocks.map(block=>{
    block = block.trim();
    if(!block) return '';
    if(block.startsWith('## ')) return `<h3>${inlineMd(block.slice(3))}</h3>`;
    if(block.startsWith('### ')) return `<h4>${inlineMd(block.slice(4))}</h4>`;
    const lines = block.split('\n').map(l=>l.trim()).filter(Boolean);
    if(lines.length && lines.every(l=>/^[-\d]/.test(l))){
      return '<ul>' + lines.map(l=>`<li>${inlineMd(l.replace(/^-\s*/,'').replace(/^\d+\.\s*/,''))}</li>`).join('') + '</ul>';
    }
    return `<p>${inlineMd(block).replace(/\n/g,'<br>')}</p>`;
  }).join('');
}
function splitCase(md){
  const idx = md.indexOf('## Corrigé');
  if(idx===-1) return {enonce:md, corrige:''};
  return {enonce: md.slice(0,idx).trim(), corrige: md.slice(idx).trim()};
}

function tickTimer(){
  clearInterval(window.__dcgTimerInterval);
  window.__dcgTimerInterval = setInterval(()=>{
    if(!ui.timer.running){ clearInterval(window.__dcgTimerInterval); return; }
    ui.timer.remainingSec--;
    const t = formatTime(ui.timer.remainingSec);
    const d1 = document.getElementById('timer-display'); if(d1) d1.textContent = t;
    const d2 = document.getElementById('mini-timer-text'); if(d2) d2.textContent = t;
    if(ui.timer.remainingSec<=0){
      clearInterval(window.__dcgTimerInterval);
      ui.timer.running = false;
      playBeep();
      render();
    }
  }, 1000);
}
function playBeep(){
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const o = ctx.createOscillator(); const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = 880; o.type = 'sine';
    g.gain.setValueAtTime(0.16, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.6);
    o.start(); o.stop(ctx.currentTime+0.6);
  }catch(e){}
}

    <div class="card">
      <p>Combien de temps as-tu devant toi ?</p>
      <div class="duration-row">${[10,20,30].map(m=>`<button class="dur-btn ${s.duration===m?'active':''}" data-action="session-duration" data-min="${m}">${m} min</button>`).join('')}</div>
      <p style="font-size:13px; color:var(--charcoal-soft);">La session enchaîne : révision de flashcards → une fiche de cours → un petit quiz.</p>
      <button class="btn btn-primary btn-block" data-action="session-begin">C'est parti</button>
    </div>`;
}
function sessionFlashcards(){
  const s = ui.session; const card = s.queue[s.index];
  if(!card) return `<div class="empty-state"><div class="big">✅</div><p>Flashcards terminées pour cette session.</p><button class="btn btn-primary btn-block" data-action="session-advance-to-course">Continuer vers le cours</button></div>`;
  return `<div class="section-title"><h2>Flashcards</h2></div>${stepTrack(1)}
    <div class="progress-line">Carte ${s.index+1} / ${s.queue.length}</div>
    ${renderFlipCard(card, s.reveal, 'session')}
    ${!s.reveal ? `<button class="btn btn-primary btn-block" data-action="reveal-answer" data-ctx="session">Voir la réponse</button>` : `
      <div class="rate-row">
        <button class="rate-btn rate-hard" data-action="rate-card" data-ctx="session" data-rating="dur">Difficile</button>
        <button class="rate-btn rate-mid" data-action="rate-card" data-ctx="session" data-rating="moyen">Moyen</button>
        <button class="rate-btn rate-easy" data-action="rate-card" data-ctx="session" data-rating="facile">Facile</button>
      </div>`}`;
}
function sessionCourse(){
  const s = ui.session;
  if(!s.courseChapId) s.courseChapId = CHAPTERS[Math.floor(Math.random()*CHAPTERS.length)].id;
  const ch = CHAPTERS.find(c=>c.id===s.courseChapId);
  return `<div class="section-title"><h2>Petite fiche de cours</h2></div>${stepTrack(2)}
    <div class="card"><div class="art-tag">${ch.ue}</div><h3 style="margin-top:8px;">${ch.title}</h3>
      <div class="md">${mdToHtml(COURSES[s.courseChapId])}</div>
      <button class="btn btn-primary btn-block" data-action="session-advance-to-exercise">Continuer vers un exercice</button>
    </div>`;
}
function sessionExercise(){
  const s = ui.session;
  if(!s.exerciseChapId) s.exerciseChapId = CHAPTERS[Math.floor(Math.random()*CHAPTERS.length)].id;
  const ch = CHAPTERS.find(c=>c.id===s.exerciseChapId);
  const qs = EXERCISES[s.exerciseChapId];
  const allAnswered = qs.every((_,qi)=>ui.quizAnswers[s.exerciseChapId+':'+qi]!==undefined);
  return `<div class="section-title"><h2>Un dernier quiz</h2></div>${stepTrack(3)}
    <div class="card"><div class="art-tag">${ch.ue}</div><h3 style="margin-top:8px;">${ch.title}</h3>
      ${renderQuiz(qs, s.exerciseChapId)}
      ${allAnswered ? `<button class="btn btn-primary btn-block" data-action="session-finish">Terminer la session</button>` : `<p style="font-size:12.5px;color:var(--charcoal-soft);">Réponds aux ${qs.length} questions pour terminer.</p>`}
    </div>`;
}
function sessionRecap(){
  const s = ui.session;
  return `<div class="section-title"><h2>Bilan de session</h2></div>${stepTrack(4)}
    <div class="card accent" style="text-align:center;">
      <div style="font-size:44px;">🏅</div><h3>Bien joué !</h3>
      <div class="stat-grid" style="margin-top:14px;">
        <div class="stat-box"><div class="num">${s.results.cards}</div><div class="lbl">cartes révisées</div></div>
        <div class="stat-box"><div class="num">${s.results.quizCorrect}/${s.results.quizTotal}</div><div class="lbl">bonnes réponses</div></div>
      </div>
      <p style="margin-top:14px;">🔥 Streak actuel : <strong>${state.stats.streak} jour${state.stats.streak>1?'s':''}</strong></p>
      <button class="btn btn-primary btn-block" data-action="session-restart">Retour à l'accueil</button>
    </div>`;
}

/* ============================= MASTER RENDER ============================= */
function render(){
  const tabs = [
    {id:'accueil', label:'Accueil', icon:'🏛️'}, {id:'flashcards', label:'Cartes', icon:'🃏'},
    {id:'cours', label:'Cours', icon:'📘'}, {id:'exercices', label:'Exercices', icon:'✍️'}, {id:'session', label:'Session', icon:'⏱️'}
  ];
  let content = '';
  if(ui.tab==='accueil') content = viewAccueil();
  else if(ui.tab==='flashcards') content = viewFlashcards();
  else if(ui.tab==='cours') content = viewCours();
  else if(ui.tab==='exercices') content = viewExercices();
  else if(ui.tab==='session') content = viewSession();

  const showMini = ui.timer.totalSec > 0 && ui.tab !== 'exercices';
  document.getElementById('root').innerHTML = `
    <div class="topbar">
      <div class="brand"><div class="seal">§</div><div><h1>Codex DCG</h1><div class="sub">DROIT (UE1) · ÉCONOMIE (UE5)</div></div></div>
      <div class="streak-badge"><span class="flame">🔥</span> ${state.stats.streak}</div>
    </div>
    <div class="view">${content}</div>
    <div style="height:20px;"></div>
    <div class="tabbar">${tabs.map(t=>`<button class="tab-btn ${ui.tab===t.id?'active':''}" data-action="set-tab" data-tab="${t.id}"><span class="ic">${t.icon}</span>${t.label}</button>`).join('')}</div>
    ${showMini ? `<div class="mini-timer" id="mini-timer-text" data-action="set-tab" data-tab="exercices">⏱️ ${formatTime(ui.timer.remainingSec)}</div>` : ''}
  `;
}

/* ============================= ACTIONS ============================= */
function setTab(tab){ ui.tab = tab; ui.openChapterId = null; ui.revealAnswer = false; render(); }

function handleAction(el){
  const action = el.dataset.action;
  if(action==='set-tab') return setTab(el.dataset.tab);
  if(action==='start-session-cta') return setTab('session');
  if(action==='filter-ue'){ ui.ueFilter = el.dataset.ue; ui.revealAnswer=false; return render(); }
  if(action==='review-mode'){ ui.reviewMode = el.dataset.mode; ui.revealAnswer=false; return render(); }

  if(action==='reveal-answer'){
    const ctx = el.dataset.ctx;
    const node = document.getElementById('flipcard-'+ctx);
    if(node) node.classList.add('flipped');
    if(ctx==='session') ui.session.reveal = true; else ui.revealAnswer = true;
    setTimeout(render, 560);
    return;
  }
  if(action==='rate-card'){
    const ctx = el.dataset.ctx;
    if(ctx==='session'){
      const s = ui.session; const card = s.queue[s.index];
      if(card){ rateCard(card, el.dataset.rating); s.results.cards++; }
      s.index++; s.reveal = false; saveState();
    } else {
      const list = filteredFlashcards(); const card = list[0];
      if(card){ rateCard(card, el.dataset.rating); saveState(); }
      ui.revealAnswer = false;
    }
    return render();
  }

  if(action==='open-chapter'){ ui.openChapterId = el.dataset.id; return render(); }
  if(action==='open-chapter-from-home'){ ui.tab='cours'; ui.openChapterId = el.dataset.id; return render(); }
  if(action==='close-chapter'){ ui.openChapterId = null; return render(); }
  if(action==='toggle-case-correction'){ const id = el.dataset.id; ui.caseRevealed[id] = !ui.caseRevealed[id]; return render(); }
  if(action==='print-page'){ window.print(); return; }
  if(action==='retry-quiz'){
    const chapId = el.dataset.id;
    Object.keys(ui.quizAnswers).forEach(k=>{ if(k.startsWith(chapId+':')) delete ui.quizAnswers[k]; });
    return render();
  }

  if(action==='copy-for-notebooklm'){
    const chapId = el.dataset.id; const ch = CHAPTERS.find(c=>c.id===chapId);
    const text = `Fiche de révision DCG — ${ch.ue} : ${ch.title}\n\n${COURSES[chapId]}`;
    navigator.clipboard.writeText(text).then(()=>{ const old = el.textContent; el.textContent='✓ Copié'; setTimeout(()=>{ el.textContent = old; }, 1800); })
      .catch(()=>{ el.textContent = 'Erreur de copie'; });
    return;
  }
  if(action==='open-notebooklm'){ window.open('https://notebooklm.google.com', '_blank'); return; }
  if(action==='copy-case'){
    const chapId = el.dataset.id; const {enonce} = splitCase(CASES[chapId]);
    navigator.clipboard.writeText(enonce.replace(/^##\s*/gm,'').trim()).then(()=>{ const old = el.textContent; el.textContent='✓ Copié'; setTimeout(()=>{ el.textContent = old; }, 1800); })
      .catch(()=>{ el.textContent = 'Erreur de copie'; });
    return;
  }

  if(action==='quiz-select'){
    const key = el.dataset.key, qi = parseInt(el.dataset.qindex,10), oi = parseInt(el.dataset.oindex,10), chapId = el.dataset.chap;
    if(ui.quizAnswers[key]!==undefined) return;
    ui.quizAnswers[key] = oi;
    if(ui.tab==='session'){
      const s = ui.session; s.results.quizTotal++;
      if(EXERCISES[chapId][qi].correctIndex===oi) s.results.quizCorrect++;
    }
    return render();
  }

  if(action==='add-card-open'){ ui.showAddCard = true; return render(); }
  if(action==='add-card-cancel'){ ui.showAddCard = false; return render(); }
  if(action==='add-card-save'){
    const ue = document.getElementById('new-card-ue').value;
    const chapId = document.getElementById('new-card-chap').value;
    const q = document.getElementById('new-card-q').value.trim();
    const a = document.getElementById('new-card-a').value.trim();
    if(!q || !a) return;
    state.flashcards.unshift({ id:uid('fc'), ue, chapId, question:q, answer:a, box:0, due:todayStr(), lastReviewed:null, custom:true });
    ui.showAddCard = false; saveState();
    return render();
  }
  if(action==='delete-card'){ state.flashcards = state.flashcards.filter(c=>c.id!==el.dataset.id); saveState(); return render(); }

  if(action==='timer-start'){ const min = parseInt(el.dataset.min,10); ui.timer = {totalSec:min*60, remainingSec:min*60, running:true}; render(); tickTimer(); return; }
  if(action==='timer-toggle'){ ui.timer.running = !ui.timer.running; render(); if(ui.timer.running) tickTimer(); return; }
  if(action==='timer-reset'){ clearInterval(window.__dcgTimerInterval); ui.timer = {totalSec:0, remainingSec:0, running:false}; return render(); }

  if(action==='session-duration'){ ui.session.duration = parseInt(el.dataset.min,10); return render(); }
  if(action==='session-begin'){
    const s = ui.session;
    s.queue = buildSessionQueue(); s.index = 0; s.reveal = false;
    s.results = {cards:0, quizCorrect:0, quizTotal:0};
    s.courseChapId = null; s.exerciseChapId = null;
    s.step = s.queue.length ? 'flashcards' : 'course';
    return render();
  }
  if(action==='session-advance-to-course'){ ui.session.step = 'course'; return render(); }
  if(action==='session-advance-to-exercise'){ ui.session.step = 'exercise'; return render(); }
  if(action==='session-finish'){ ui.session.step = 'recap'; state.stats.sessionsCompleted++; markActivityToday(); saveState(); return render(); }
  if(action==='session-restart'){
    ui.session = { step:'setup', duration:20, queue:[], index:0, reveal:false, results:{cards:0, quizCorrect:0, quizTotal:0}, courseChapId:null, exerciseChapId:null };
    return setTab('accueil');
  }
}

document.getElementById('root').addEventListener('click', (e)=>{
  const el = e.target.closest('[data-action]');
  if(el) handleAction(el);
});

/* ============================= INIT ============================= */
loadState();
render();
</script>
</body>
</html>
